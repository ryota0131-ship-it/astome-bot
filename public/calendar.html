<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ASTOme</title>
<style>
:root {
  --navy: #0E1D2B;
  --gold: #F3C25B;
  --gold-d: #c8902f;
  --cream: #FAFAF7;
  --ivory: #F4EEDC;
  --sage: #7E9D88;
  --sage-d: #5d7a67;
  --ink: #2b3530;
  --muted: #8a968e;
  --line: #e8e2d4;
  --card: #fbf8f1;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }
body {
  background: var(--cream);
  color: var(--ink);
  font-family: -apple-system, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  max-width: 390px;
  margin: 0 auto;
  padding-bottom: calc(84px + env(safe-area-inset-bottom));
  line-height: 1.8;
}
.serif { font-family: 'Hiragino Mincho ProN', 'Noto Serif JP', Georgia, serif; }
.screen { display: none; }
.screen.active { display: block; animation: up .35s ease; }
@keyframes up { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }

/* ===== ヒーロー ===== */
.hero {
  position: relative;
  padding: 52px 24px 78px;
  background:

  linear-gradient(

  180deg,

  #1a2d44 0%,

  #294760 45%,

  #d8b28d 85%,

  #f5e8d8 100%

  );
  color: var(--cream);
  overflow: hidden;
}
.star { position: absolute; background: #fff; border-radius: 50%; animation: tw 4s ease-in-out infinite; }
@keyframes tw { 0%, 100% { opacity: .15; } 50% { opacity: .85; } }
.shoot {
  position: absolute; top: 48px; left: 58%;
  width: 60px; height: 1px;
  background: linear-gradient(90deg, transparent, #fff);
  transform: rotate(22deg); opacity: .6;
}
.hero-brand { font-size: 16px; font-weight: 700; letter-spacing: .18em; opacity: .65; }
.hero-brand b { color: var(--gold); }
.hero-name { font-size: 27px; font-weight: 700; line-height: 1.4; margin-top: 22px; }
.hero-sub { font-size: 14px; opacity: .68; margin-top: 8px; }
.hero-asto {
  position: absolute; right: 18px; bottom: 60px;
  width: 84px; height: 84px; border-radius: 50%;
  background: radial-gradient(circle at 38% 32%, #2a4660, #0b1822);
  box-shadow: 0 0 0 2px rgba(243,194,91,.35), 0 10px 28px -10px rgba(0,0,0,.5);
  display: flex; align-items: center; justify-content: center;
  font-size: 43px;
  animation: bob 5s ease-in-out infinite;
}
/* ASTO画像を使う場合は .hero-asto img { width:100%; height:100%; border-radius:50%; object-fit:cover; } */
@keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

/* ===== シート ===== */
.sheet { margin-top: -44px; padding: 0 16px; position: relative; z-index: 2; }

/* ASTOの一言 */
.asto-say {
  background: var(--card); border: 1px solid var(--line); border-radius: 20px;
  padding: 14px 16px 18px 18px;
  display: flex; align-items: flex-start; gap: 13px;
  box-shadow: 0 6px 24px -14px rgba(40,53,48,.5);
  margin-bottom: 18px;
}
.asto-ico {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  background: radial-gradient(circle at 38% 32%, #2a4660, #0b1822);
  box-shadow: 0 0 0 1.5px rgba(243,194,91,.28);
  display: flex; align-items: center; justify-content: center; font-size: 19px;
}
/* ASTO画像を使う場合は .asto-ico img { width:100%; height:100%; border-radius:50%; object-fit:cover; } */
.asto-say-text { font-size: 15px; line-height: 1.95; padding-top: 1px; }

/* いちばん楽しみな未来 */
.hero-future {
  background: var(--card); border: 1px solid var(--line); border-radius: 20px;
  padding: 22px 22px 24px;
  box-shadow: 0 6px 24px -14px rgba(40,53,48,.5);
  margin-bottom: 18px;
}
.hf-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .12em; margin-bottom: 14px; }
.hf-emoji { font-size: 24px; line-height: 1; }
.hf-name { font-size: 30px; font-weight: 700; line-height: 1.25; margin-top: 6px; }
.hf-days { font-size: 15px; color: var(--gold-d); font-weight: 700; margin-top: 8px; }
.hf-scene { font-size: 14px; color: var(--sage-d); line-height: 1.85; margin-top: 14px; font-style: italic; }

/* これから楽しみなこと */
.sec-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .12em; margin: 0 4px 10px; }
.coming-list {
  background: var(--card); border: 1px solid var(--line); border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 6px 24px -14px rgba(40,53,48,.5);
  margin-bottom: 26px;
}
.coming-row { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--line); }
.coming-row:last-child { border-bottom: none; }
.coming-emo { font-size: 20px; width: 26px; text-align: center; flex-shrink: 0; }
.coming-name { font-size: 15px; font-weight: 600; }
.coming-when { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* ASTOと話す */
.talk-btn {
  width: 100%; background: var(--navy); color: var(--cream); border: none;
  border-radius: 999px; padding: 17px; font-size: 16px; font-weight: 700;
  font-family: inherit; letter-spacing: .04em; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: 0 12px 30px -12px rgba(14,29,43,.65);
  transition: transform .15s;
}
.talk-btn:active { transform: scale(0.98); }

/* ===== 育てる ===== */
.sodate-screen { padding: 30px 16px 20px; }
.sodate-head { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
.sodate-asto {
  width: 52px; height: 52px; border-radius: 50%;
  background: radial-gradient(circle at 38% 32%, #2a4660, #0b1822);
  box-shadow: 0 0 0 1.5px rgba(243,194,91,.28);
  display: flex; align-items: center; justify-content: center; font-size: 26px;
  animation: bob 5s ease-in-out infinite;
}
.sodate-intro { font-size: 15.5px; line-height: 1.85; }
.seed-simple {
  background: var(--card); border: 1px solid var(--line); border-radius: 18px;
  overflow: hidden; margin-bottom: 18px;
  box-shadow: 0 4px 16px -10px rgba(40,53,48,.4);
}
.seed-row2 { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--line); }
.seed-row2:last-child { border-bottom: none; }
.seed-emo2 { font-size: 20px; flex-shrink: 0; }
.seed-name2 { font-size: 15px; font-weight: 600; }

/* ===== 人生 ===== */
.jinsei-screen { padding: 32px 16px 20px; }
.jinsei-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.jinsei-sub { font-size: 13px; color: var(--muted); margin-bottom: 22px; }
.leaf {
  background: var(--card); border: 1px solid var(--line); border-radius: 18px;
  padding: 15px 17px; display: flex; align-items: center; gap: 13px;
  box-shadow: 0 4px 14px -10px rgba(40,53,48,.4);
}
.leaf-ico { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.i-seed { background: #e4efe1; }
.i-ev   { background: #fdf0dc; }
.i-done { background: #f0f4e8; }
.leaf-label { font-size: 14.5px; font-weight: 600; }
.leaf-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
.spine { height: 18px; margin-left: 30px; border-left: 1.5px solid var(--sage); opacity: .45; position: relative; }
.spine::after { content: '↓'; position: absolute; left: -7px; top: -1px; color: var(--sage); font-size: 12px; opacity: .8; }

/* ===== ボトムシート ===== */
.sheet-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 80;
  background: rgba(14,29,43,.45);
  backdrop-filter: blur(2px);
  animation: fadeIn .2s ease;
}
.sheet-overlay.open { display: block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.bottom-sheet {
  position: fixed; left: 0; right: 0; bottom: 0;
  max-width: 390px; margin: 0 auto;
  background: var(--cream);
  border-radius: 24px 24px 0 0;
  padding: 0 0 calc(32px + env(safe-area-inset-bottom));
  z-index: 90;
  transform: translateY(100%);
  transition: transform .32s cubic-bezier(.32,1,.42,1);
  box-shadow: 0 -8px 40px -8px rgba(14,29,43,.22);
}
.bottom-sheet.open { transform: translateY(0); }

.bs-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--line); margin: 12px auto 0;
}
.bs-body { padding: 20px 22px 0; }
.bs-emoji { font-size: 32px; line-height: 1; margin-bottom: 10px; }
.bs-title { font-size: 22px; font-weight: 700; line-height: 1.3; }
.bs-when {
  display: inline-block; margin-top: 8px;
  font-size: 13px; font-weight: 700; color: var(--gold-d);
  background: #fdf5e4; border-radius: 999px; padding: 3px 12px;
}
.bs-status {
  display: inline-block; margin-top: 6px; margin-left: 6px;
  font-size: 12px; color: var(--muted);
  background: var(--ivory); border-radius: 999px; padding: 3px 10px;
}
.bs-scene {
  margin-top: 16px; padding: 14px 16px;
  background: var(--card); border: 1px solid var(--line); border-radius: 16px;
  display: flex; gap: 10px; align-items: flex-start;
}
.bs-scene-ico {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: radial-gradient(circle at 38% 32%, #2a4660, #0b1822);
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.bs-scene-text { font-size: 14px; line-height: 1.85; color: var(--ink); padding-top: 2px; }
.bs-seed {
  margin-top: 14px; font-size: 13px; color: var(--muted);
  display: flex; align-items: center; gap: 6px;
}
.bs-seed span { color: var(--sage-d); font-weight: 600; }
.bs-talk {
  margin-top: 20px; width: 100%;
  background: var(--navy); color: var(--cream); border: none;
  border-radius: 999px; padding: 15px; font-size: 15px; font-weight: 700;
  font-family: inherit; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}

/* ===== タブ ===== */
.tabbar {
  position: fixed; left: 0; right: 0; bottom: 0;
  max-width: 390px; margin: 0 auto;
  background: rgba(250,250,247,.95); backdrop-filter: blur(14px);
  border-top: 1px solid var(--line); display: flex;
  padding: 6px 0 calc(10px + env(safe-area-inset-bottom));
  z-index: 60;
}
.tab {
  flex: 1; border: none; background: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 4px 0; font-family: inherit; color: var(--muted);
  transition: color .2s; position: relative;
}
.tab.active { color: var(--navy); }
.tab.active::before { content: ''; position: absolute; top: 0; width: 18px; height: 2.5px; border-radius: 0 0 3px 3px; background: var(--gold); }
.tab-ico { font-size: 20px; line-height: 1; }
.tab-lbl { font-size: 10px; font-weight: 700; letter-spacing: .04em; }
</style>
</head>
<body>

<!-- ========== 🗓 未来 ========== -->
<section class="screen active" id="s-mirai">
  <div class="hero" id="hero">
    <div class="shoot"></div>
    <div class="hero-brand serif">ASTO <b>✦</b></div>
    <div class="hero-name" id="hero-name"></div>
    <div class="hero-sub">今日も未来を楽しみにいこう。</div>
    <!-- ASTO画像: <img> に差し替える場合は下記を使用
    <div class="hero-asto"><img src="assets/asto/asto_wave.png" alt="ASTO"></div>
    -->
    <div class="hero-asto">🐋</div>
  </div>

  <div class="sheet">
    <div class="asto-say">
      <!-- ASTO画像: <img> に差し替える場合は下記を使用
      <div class="asto-ico"><img src="assets/asto/asto_smile.png" alt="ASTO"></div>
      -->
      <div class="asto-ico">🐋</div>
      <div class="asto-say-text" id="asto-say-text"></div>
    </div>

    <div class="hero-future" id="hero-future"></div>

    <div class="sec-label">これから楽しみなこと</div>
    <div class="coming-list" id="coming-list"></div>

    <button class="talk-btn" onclick="switchTab('sodate')">🤍&nbsp;&nbsp;ASTOと話す</button>
  </div>
</section>

<!-- ========== 🐋 育てる ========== -->
<section class="screen" id="s-sodate">
  <div class="sodate-screen">
    <div class="sodate-head">
      <!-- ASTO画像: <img> に差し替える場合は下記を使用
      <div class="sodate-asto"><img src="assets/asto/asto_peek.png" alt="ASTO"></div>
      -->
      <div class="sodate-asto">🐋</div>
      <div class="sodate-intro" id="sodate-intro"></div>
    </div>
    <div class="seed-simple" id="seed-list"></div>
    <button class="talk-btn" onclick="openLine()">💬&nbsp;&nbsp;ASTOに話しかける</button>
  </div>
</section>

<!-- ========== 📖 人生 ========== -->
<section class="screen" id="s-jinsei">
  <div class="jinsei-screen">
    <div class="jinsei-title serif">人生</div>
    <div class="jinsei-sub">種が繋がっていく場所</div>
    <div id="jinsei-wrap"></div>
  </div>
</section>

<!-- ========== ボトムシート ========== -->
<div class="sheet-overlay" id="bs-overlay" onclick="closeSheet()"></div>
<div class="bottom-sheet" id="bottom-sheet">
  <div class="bs-handle"></div>
  <div class="bs-body" id="bs-body"></div>
</div>

<!-- ========== タブ ========== -->
<nav class="tabbar">
  <button class="tab active" data-s="mirai"  onclick="switchTab('mirai')"><span class="tab-ico">🗓</span><span class="tab-lbl">未来</span></button>
  <button class="tab"        data-s="sodate" onclick="switchTab('sodate')"><span class="tab-ico">🐋</span><span class="tab-lbl">育てる</span></button>
  <button class="tab"        data-s="jinsei" onclick="switchTab('jinsei')"><span class="tab-ico">📖</span><span class="tab-lbl">人生</span></button>
</nav>

<script>
/* ==========================================================
   データ
   - 本番では /api/calendar-data?userId=xxx から取得
   - userId がない場合はデモデータを使用
   - futureBalanceHistory は使用しない
   ========================================================== */
const DEMO = {
  userName: 'りょうた',
  futureEvents: [
    {
      title: '釧路湿原マラソン',
      status: 'scheduled',
      date: '2026-11',
      emoji: '🏃',
      daysLeft: 139,
      scene: '11月の海風が気持ちよさそうだね😊',
    },
    {
      title: '鬼怒川温泉',
      status: 'plan',
      date: '2026-09',
      emoji: '♨️',
      scene: '温泉に浸かってるとこ、想像するだけでほっとするね😊',
    },
    {
      title: '嫁さんと寿司',
      status: 'interest',
      date: null,
      emoji: '🍣',
      scene: '二人でカウンターに座ってるところが目に浮かぶ😊',
    },
    {
      title: '屋久島',
      status: 'dream',
      date: null,
      emoji: '🏝',
      scene: '縄文杉の前に立つ自分が楽しみだね😊',
    },
  ],
  seeds: [
    { name: '鬼怒川でリセット', emoji: '♨️' },
    { name: 'グルメ探し',       emoji: '🍣' },
    { name: 'ペペロンチーノ自作', emoji: '🍝' },
  ],
  harvestedSeeds: [
    {
      name: 'カツカレー探し',
      emoji: '🍛',
      harvestNote: '最高だった',
      originalWish: '美味しいカツカレー探してた',
      futureTitle: '蒲田カツカレー',
      nextSeed: '屋久島に行きたい',
    },
  ],
};

/* ==========================================================
   データ取得
   ========================================================== */
async function loadData() {
  const uid = new URLSearchParams(location.search).get('userId');
  if (uid) {
    try {
      const r = await fetch(`/api/calendar-data?userId=${encodeURIComponent(uid)}`);
      if (r.ok) return await r.json();
    } catch (e) { /* デモにフォールバック */ }
  }
  return DEMO;
}

/* ==========================================================
   ユーティリティ
   ========================================================== */
// 日付から温度感のある「いつごろ」ラベルを返す（数字は使わない）
function whenLabel(date, status) {
  if (!date) {
    return status === 'interest' ? '近いうちに' : 'いつか';
  }
  const m = parseInt(date.split('-')[1], 10);
  if ([12,1,2].includes(m)) return '冬ごろ';
  if ([3,4,5].includes(m))  return '春ごろ';
  if ([6,7,8].includes(m))  return '夏ごろ';
  return '秋ごろ';
}

/* ==========================================================
   描画
   ========================================================== */
let DATA;

function renderMirai() {
  document.getElementById('hero-name').innerHTML = `おかえり、<br>${DATA.userName}さん`;

  const lead = DATA.futureEvents.find(e => e.status === 'scheduled')
             || DATA.futureEvents.find(e => e.status === 'plan');

  // ASTOの一言（固定・短い）
  document.getElementById('asto-say-text').innerHTML = lead
    ? `${lead.title}、<br>楽しみだね😊<br><br>今日も少しずつ<br>未来に近づいてるよ🌱`
    : `今日もいい一日だった？😊<br>小さなこと、ASTOに話してみてね🌱`;

  // いちばん楽しみな未来
  const hf = document.getElementById('hero-future');
  if (lead) {
    const timing = lead.daysLeft
      ? `あと ${lead.daysLeft} 日`
      : whenLabel(lead.date, lead.status);
    hf.innerHTML = `
      <div class="hf-label">✨ いちばん楽しみな未来</div>
      <div class="hf-emoji">${lead.emoji || '✨'}</div>
      <div class="hf-name serif">${lead.title}</div>
      <div class="hf-days">${timing}</div>
      ${lead.scene ? `<div class="hf-scene">${lead.scene}</div>` : ''}`;
  } else {
    hf.style.display = 'none';
  }

  // これから楽しみなこと（lead 以外）
  const others = DATA.futureEvents.filter(e => e !== lead);
  document.getElementById('coming-list').innerHTML = others.map((e, i) => `
    <div class="coming-row" style="cursor:pointer" onclick="openSheet(${DATA.futureEvents.indexOf(e)})">
      <span class="coming-emo">${e.emoji || '✨'}</span>
      <div style="flex:1">
        <div class="coming-name">${e.title}</div>
        <div class="coming-when">${whenLabel(e.date, e.status)}</div>
      </div>
      <span style="color:var(--muted);font-size:16px;opacity:.4">›</span>
    </div>`).join('');

  // hero-futureもタップ可能に
  if (lead) {
    document.getElementById('hero-future').style.cursor = 'pointer';
    document.getElementById('hero-future').onclick = () => openSheet(DATA.futureEvents.indexOf(lead));
  }
}

function renderSodate() {
  document.getElementById('sodate-intro').innerHTML = `最近気になってることだね😊`;
  document.getElementById('seed-list').innerHTML = (DATA.seeds || []).map(s => `
    <div class="seed-row2">
      <span class="seed-emo2">${s.emoji || '🌱'}</span>
      <span class="seed-name2">${s.name}</span>
    </div>`).join('');
}

function renderJinsei() {
  const nodes = [];
  const h = (DATA.harvestedSeeds || [])[0];
  if (h) {
    if (h.originalWish) nodes.push({ cls:'i-seed', ico:'🌱', label: h.originalWish,   sub:'って思ってた' });
    if (h.futureTitle)  nodes.push({ cls:'i-ev',   ico: h.emoji || '📅', label:`${h.futureTitle}に行く`, sub:'と決めた' });
    nodes.push({ cls:'i-done', ico:'🌾', label: h.name, sub: h.harvestNote ? `「${h.harvestNote}」` : '' });
    if (h.nextSeed)     nodes.push({ cls:'i-seed', ico:'🌱', label: h.nextSeed,        sub:'って思った' });
  }
  const gs = (DATA.seeds || [])[0];
  if (gs) {
    nodes.push({ cls:'i-seed', ico:'🌱', label: gs.name, sub:'育ち中' });
    const ev = (DATA.futureEvents || []).find(e => e.sourceSeed === gs.name);
    if (ev) nodes.push({ cls:'i-ev', ico: ev.emoji || '📅', label: ev.title, sub: whenLabel(ev.date, ev.status) });
  }
  document.getElementById('jinsei-wrap').innerHTML = nodes.length
    ? nodes.map((n, i) => `
        <div class="leaf">
          <div class="leaf-ico ${n.cls}">${n.ico}</div>
          <div>
            <div class="leaf-label">${n.label}</div>
            <div class="leaf-sub">${n.sub}</div>
          </div>
        </div>
        ${i < nodes.length - 1 ? '<div class="spine"></div>' : ''}`).join('')
    : '<p style="color:var(--muted);font-size:14px;margin-top:40px;text-align:center;line-height:2">ASTOと話して<br>最初の一粒をまこう🌱</p>';
}

/* ==========================================================
   ボトムシート
   ========================================================== */
const STATUS_LABEL = { dream:'いつか', interest:'気になってる', plan:'計画中', scheduled:'予定あり' };
let currentSeed = null;

function openSheet(idx) {
  const e = DATA.futureEvents[idx];
  currentSeed = e.title;
  if (!e) return;

  const when = e.daysLeft ? `あと ${e.daysLeft} 日` : whenLabel(e.date, e.status);
  const statusLabel = STATUS_LABEL[e.status] || e.status;
  const seedHtml = e.sourceSeed
    ? `<div class="bs-seed">🌱 <span>「${e.sourceSeed}」</span>の種から生まれた</div>`
    : '';
  const sceneHtml = e.scene
    ? `<div class="bs-scene">
        <div class="bs-scene-ico">🐋</div>
        <div class="bs-scene-text">${e.scene}</div>
       </div>`
    : '';

  document.getElementById('bs-body').innerHTML = `
    <div class="bs-emoji">${e.emoji || '✨'}</div>
    <div class="bs-title">${e.title}</div>
    <div>
      <span class="bs-when">${when}</span>
      <span class="bs-status">${statusLabel}</span>
    </div>
    ${sceneHtml}
    ${seedHtml}
    <button class="bs-talk" onclick="openLine(currentSeed)">💬&nbsp;&nbsp;ASTOと話す</button>
  `;

  document.getElementById('bs-overlay').classList.add('open');
  document.getElementById('bottom-sheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  document.getElementById('bs-overlay').classList.remove('open');
  document.getElementById('bottom-sheet').classList.remove('open');
  document.body.style.overflow = '';
}

// スワイプダウンで閉じる
(function() {
  let startY = 0;
  const sheet = document.getElementById('bottom-sheet');
  sheet.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
  sheet.addEventListener('touchend', e => {
    if (e.changedTouches[0].clientY - startY > 60) closeSheet();
  }, { passive: true });
})();

/* ==========================================================
   ナビ
   ========================================================== */
function switchTab(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-' + name).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.s === name));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// LINEへ遷移（seedNameがあれば会話の入口テキストを渡す）
function openLine(seedName) {
  const base = 'https://line.me/R/ti/p/@624btbtc';
  if (seedName) {
    const text = encodeURIComponent(\`「\${seedName}」について話したい\`);
    location.href = \`\${base}?oaMessage=\${text}\`;
  } else {
    location.href = base;
  }
}

/* ==========================================================
   星空
   ========================================================== */
function makeStars() {
  const h = document.getElementById('hero');
  let s = '';
  for (let i = 0; i < 22; i++) {
    const sz = Math.random() * 2 + .8;
    const x  = Math.random() * 100;
    const y  = Math.random() * 55;
    const d  = Math.random() * 4;
    s += `<div class="star" style="width:${sz}px;height:${sz}px;left:${x}%;top:${y}%;opacity:.6;animation-delay:${d}s"></div>`;
  }
  h.insertAdjacentHTML('afterbegin', s);
}

/* ==========================================================
   起動
   ========================================================== */
(async () => {
  makeStars();
  DATA = await loadData();
  renderMirai();
  renderSodate();
  renderJinsei();
})();
</script>
