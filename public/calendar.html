<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ASTOme</title>
<meta name="description" content="人生に、次の楽しみを。ASTOと一緒に未来の種を見つけて育てるアプリ">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0E1D2B">
<link rel="icon" href="/icons/favicon-32.png" sizes="32x32">
<link rel="icon" href="/icons/favicon-16.png" sizes="16x16">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ASTOme">
<meta name="mobile-web-app-capable" content="yes">
<style>
:root {
  --navy:#0E1D2B; --navy-2:#152535; --gold:#F3C25B; --gold-d:#c8902f;
  --cream:#FAFAF7; --ivory:#F4EEDC; --sage:#7E9D88; --sage-d:#5d7a67;
  --ink:#2b3530; --muted:#8a968e; --line:#e8e2d4; --card:#fbf8f1;
  --ease-spring: cubic-bezier(.34,1.3,.5,1);
  --ease-out: cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--cream);color:var(--ink);
  font-family:-apple-system,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  max-width:390px;margin:0 auto;
  padding-bottom:calc(84px + env(safe-area-inset-bottom));
  line-height:1.8;
}
.serif{font-family:'Hiragino Mincho ProN','Noto Serif JP',Georgia,serif}
button{font-family:inherit}
button:focus-visible,[onclick]:focus-visible{outline:2px solid var(--sage);outline-offset:2px;border-radius:8px}
.screen{display:none}
.screen.active{display:block;animation:up .4s var(--ease-out)}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ===== 時間帯で変わるヒーロー ===== */
.hero{
  position:relative;padding:52px 24px 84px;
  color:var(--cream);overflow:hidden;
  transition:background 1.2s ease;
}
.hero.sky-dawn { background:linear-gradient(180deg,#1a2d44 0%,#3d4a66 30%,#c98a6e 68%,#f3c98d 88%,#f8ecd8 100%); }
.hero.sky-day  { background:linear-gradient(180deg,#3d6584 0%,#6d94ad 45%,#c9d8d4 82%,#f2efe2 100%); }
.hero.sky-dusk { background:linear-gradient(180deg,#16273c 0%,#33415e 40%,#b06a52 75%,#e8b277 95%,#f5e4c8 100%); }
.hero.sky-night{ background:linear-gradient(180deg,#0a1522 0%,#13233a 55%,#22374f 85%,#31465d 100%); }
.star{position:absolute;background:#fff;border-radius:50%;animation:tw 4s ease-in-out infinite}
@keyframes tw{0%,100%{opacity:.12}50%{opacity:.85}}
.shoot{position:absolute;top:44px;left:58%;width:64px;height:1px;background:linear-gradient(90deg,transparent,#fff);transform:rotate(22deg);opacity:0;animation:shootby 7s ease-in-out infinite}
@keyframes shootby{0%,88%,100%{opacity:0}92%{opacity:.7}96%{opacity:0;transform:rotate(22deg) translateX(-30px)}}
.hero-sun{position:absolute;right:26%;width:34px;height:34px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#FFEFC4,var(--gold));
  box-shadow:0 0 34px rgba(243,194,91,.55);pointer-events:none;transition:top 1.2s ease,opacity 1.2s ease}
.sky-dawn  .hero-sun{top:58%}
.sky-day   .hero-sun{top:14%}
.sky-dusk  .hero-sun{top:64%;background:radial-gradient(circle at 35% 30%,#FFD9A8,#E8A45B);box-shadow:0 0 34px rgba(232,164,91,.55)}
.sky-night .hero-sun{opacity:0}
.hero-cloud{position:absolute;height:10px;border-radius:10px;background:rgba(255,255,255,.35);filter:blur(4px);animation:cloudDrift 40s linear infinite;pointer-events:none}
@keyframes cloudDrift{from{transform:translateX(-120px)}to{transform:translateX(440px)}}
.sky-night .hero-cloud{opacity:.08}
.hero-brand{position:relative;font-size:16px;font-weight:700;letter-spacing:.18em;opacity:.7}
.hero-brand b{color:var(--gold)}
.hero-name{position:relative;font-size:27px;font-weight:700;line-height:1.4;margin-top:22px}
.hero-sub{position:relative;font-size:14px;opacity:.72;margin-top:8px}
.hero-asto{
  position:absolute;right:18px;bottom:66px;
  width:88px;height:88px;border-radius:50%;
  background:radial-gradient(circle at 38% 32%,#2a4660,#0b1822);
  box-shadow:0 0 0 2px rgba(243,194,91,.35),0 10px 28px -10px rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;font-size:43px;
  animation:bob 5s ease-in-out infinite;overflow:hidden;
}
.hero-asto img{width:100%;height:100%;object-fit:cover;object-position:center 30%}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.sheet{margin-top:-48px;padding:0 16px;position:relative;z-index:2}

/* 順番に現れるカード */
.reveal{opacity:0;transform:translateY(14px);animation:reveal .55s var(--ease-out) forwards}
@keyframes reveal{to{opacity:1;transform:none}}

/* ===== ASTOの一言 ===== */
.asto-say{
  background:var(--card);border:1px solid var(--line);border-radius:20px;
  padding:14px 16px 18px 18px;
  display:flex;align-items:flex-start;gap:13px;
  box-shadow:0 6px 24px -14px rgba(40,53,48,.5);margin-bottom:20px;
}
.asto-ico{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 38% 32%,#2a4660,#0b1822);
  box-shadow:0 0 0 1.5px rgba(243,194,91,.28);
  display:flex;align-items:center;justify-content:center;font-size:19px;overflow:hidden;
}
.asto-ico img{width:100%;height:100%;object-fit:contain;display:block}
.asto-say-text{font-size:15px;line-height:1.95;padding-top:1px}

/* ===== いちばん近い未来(ヒーローカード) ===== */
.hero-future{
  border-radius:24px;overflow:hidden;margin-bottom:22px;
  box-shadow:0 8px 36px -12px rgba(14,29,43,.4);
  cursor:pointer;transition:transform .18s var(--ease-spring);
  position:relative;
}
.hero-future:active{transform:scale(0.98)}
.hf-bg{
  position:relative;
  background:linear-gradient(160deg,#16283f 0%,#223c58 52%,#2e5572 100%);
  padding:26px 24px 24px;color:var(--cream);overflow:hidden;
}
.hf-horizon{position:absolute;left:0;right:0;bottom:0;height:66px;pointer-events:none;opacity:.55}
.hf-horizon-sun{position:absolute;left:50%;bottom:16px;width:52px;height:52px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#FFE9B8,rgba(243,194,91,.85));
  transform:translateX(-50%);filter:blur(1px);
  box-shadow:0 0 44px 12px rgba(243,194,91,.35);
  animation:sunRise 6s ease-in-out infinite alternate}
@keyframes sunRise{from{transform:translateX(-50%) translateY(6px)}to{transform:translateX(-50%) translateY(-2px)}}
.hf-horizon-sea{position:absolute;left:0;right:0;bottom:0;height:26px;background:linear-gradient(180deg,rgba(28,61,74,.0),rgba(28,61,74,.9))}
.hf-top{position:relative;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
.hf-label{font-size:11px;font-weight:700;letter-spacing:.14em;opacity:.55}
.hf-count{
  flex-shrink:0;text-align:center;
  background:rgba(243,194,91,.14);border:1px solid rgba(243,194,91,.4);
  border-radius:16px;padding:8px 14px 7px;line-height:1.2;
}
.hf-count-num{font-size:24px;font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums}
.hf-count-unit{font-size:10px;font-weight:700;color:var(--gold);opacity:.85}
.hf-count-pre{font-size:10px;font-weight:700;color:var(--gold);opacity:.85;display:block;margin-bottom:1px}
.hf-emoji{position:relative;font-size:40px;line-height:1;margin-bottom:12px}
.hf-name{position:relative;font-size:29px;font-weight:800;line-height:1.25;margin-bottom:18px}
.hf-scene{
  position:relative;font-size:15px;line-height:2.05;opacity:.92;
  padding-top:16px;border-top:1px solid rgba(255,255,255,.1);
}
.hf-closing{position:relative;font-size:13px;opacity:.6;margin-top:16px;padding-top:13px;border-top:1px solid rgba(255,255,255,.08);letter-spacing:.04em}
.hf-tap-hint{position:relative;display:flex;align-items:center;justify-content:flex-end;gap:4px;font-size:11px;opacity:.4;margin-top:12px}

/* ===== 未来カード(グループ) ===== */
.future-group{margin-bottom:24px}
.future-group-label{
  font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.12em;
  margin:0 4px 10px;display:flex;align-items:center;gap:6px;
}
.future-cards{display:flex;flex-direction:column;gap:10px}
.future-card{
  background:var(--card);border:1px solid var(--line);border-radius:20px;
  padding:15px 16px;cursor:pointer;min-height:64px;
  display:flex;align-items:center;gap:14px;
  box-shadow:0 4px 16px -10px rgba(40,53,48,.28);
  transition:transform .18s var(--ease-spring);
}
.future-card:active{transform:scale(0.97)}
.fc-emoji{
  width:48px;height:48px;border-radius:16px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:24px;
}
.fc-emoji-scheduled{background:linear-gradient(135deg,#1a2d44,#2a4a6a)}
.fc-emoji-plan     {background:linear-gradient(135deg,#3d6b4f,#5a8c68)}
.fc-emoji-interest {background:linear-gradient(135deg,#6b5a2a,#8c7a3a)}
.fc-emoji-dream    {background:linear-gradient(135deg,#3a3a4a,#555568)}
.fc-body{flex:1;min-width:0}
.fc-title{font-size:15px;font-weight:700;line-height:1.35}
.fc-snippet{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.55;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.fc-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.fc-badge{font-size:10px;font-weight:700;border-radius:999px;padding:2px 9px}
.fc-badge-scheduled{background:rgba(243,194,91,.18);color:var(--gold-d)}
.fc-badge-plan     {background:rgba(126,157,136,.18);color:var(--sage-d)}
.fc-badge-interest {background:rgba(180,160,100,.12);color:#7a6a30}
.fc-badge-dream    {background:rgba(100,100,120,.1);color:var(--muted)}
.fc-days{font-size:10.5px;font-weight:700;color:var(--gold-d);font-variant-numeric:tabular-nums}
.fc-arrow{font-size:14px;color:var(--muted);opacity:.4}

/* ===== FAB ===== */
.fab{
  position:fixed;right:20px;bottom:calc(78px + env(safe-area-inset-bottom));
  width:58px;height:58px;border-radius:50%;
  background:linear-gradient(135deg,#2a4a3a,#1a2d44);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;
  box-shadow:0 6px 16px -4px rgba(14,29,43,.4),0 0 0 1.5px rgba(243,194,91,.25);
  z-index:50;transition:transform .18s var(--ease-spring);
}
.fab:active{transform:scale(0.9)}
.fab-whale{width:42px;height:42px;display:flex;align-items:center;justify-content:center;line-height:1}
.fab-whale img{width:100%;height:100%;object-fit:contain;display:block}
.fab-dots{font-size:9px;letter-spacing:2px;color:var(--cream);height:12px;display:flex;align-items:center;gap:2px}
.fab-dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.5);animation:dotpulse 1.4s ease-in-out infinite}
.fab-dot:nth-child(1){animation-delay:0s}
.fab-dot:nth-child(2){animation-delay:.2s}
.fab-dot:nth-child(3){animation-delay:.4s}
@keyframes dotpulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* ===== 育てるタブ ===== */
.sodate-header{padding:36px 20px 18px}
.sodate-title{font-size:22px;font-weight:800;margin-bottom:4px}
.sodate-sub{font-size:13px;color:var(--muted)}

/* セグメント切替(iOS風) */
.view-switch{position:relative;display:flex;background:rgba(232,226,212,.55);border-radius:999px;padding:4px;margin:0 16px 18px}
.view-thumb{
  position:absolute;top:4px;bottom:4px;left:4px;width:calc(50% - 4px);
  background:var(--card);border-radius:999px;
  box-shadow:0 2px 8px -2px rgba(40,53,48,.25);
  transition:transform .3s var(--ease-spring);
}
.view-switch[data-view="koukai"] .view-thumb{transform:translateX(100%)}
.view-btn{flex:1;position:relative;text-align:center;padding:10px 0;border-radius:999px;border:none;background:none;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:color .25s;display:flex;align-items:center;justify-content:center;gap:5px}
.view-btn.active{color:var(--navy)}
.view-pane{display:none}
.view-pane.active{display:block;animation:up .35s var(--ease-out)}

/* 種カード */
.seed-cards{padding:0 16px;display:flex;flex-direction:column;gap:16px;margin-bottom:8px}
.seed-card{
  background:var(--card);border:1px solid var(--line);border-radius:24px;
  overflow:hidden;box-shadow:0 4px 20px -10px rgba(40,53,48,.2);
}
.seed-status-bar{
  padding:11px 20px;
  display:flex;align-items:center;gap:9px;
  border-bottom:1px solid var(--line);
}
.seed-stage-dots{display:flex;align-items:center;gap:4px}
.seed-stage-dot{width:7px;height:7px;border-radius:50%;background:var(--line);transition:background .3s}
.seed-stage-dot.on{background:var(--sage)}
.seed-status-text{font-size:12px;font-weight:700;color:var(--sage-d)}
.seed-timing-tag{font-size:10px;font-weight:700;color:var(--muted);background:var(--ivory);border-radius:999px;padding:3px 10px;margin-left:auto}
.seed-card-body{padding:18px 20px 20px;cursor:pointer}
.seed-name{font-size:17px;font-weight:800;line-height:1.35;margin-bottom:12px}
.seed-wish{
  padding:13px 15px;background:var(--ivory);border-radius:14px;
  font-size:14px;color:var(--ink);line-height:1.8;font-style:italic;margin-bottom:14px;
}
.seed-wish::before{content:'💬 ';font-style:normal}
.seed-asto-msg{font-size:14px;color:var(--muted);line-height:1.85}
.seed-prep-line{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--sage-d);font-weight:700;margin-top:14px;padding-top:13px;border-top:1px solid var(--line)}
.seed-prep-count{margin-left:auto;font-variant-numeric:tabular-nums;color:var(--muted);font-weight:700;font-size:11.5px}
.seed-prep-bar{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin-top:8px}
.seed-prep-bar-fill{height:100%;background:linear-gradient(90deg,var(--sage),#8fae98);border-radius:3px;transition:width .5s var(--ease-out)}
.seed-talk-btn{
  width:100%;background:var(--navy);color:var(--cream);border:none;
  border-radius:999px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:transform .18s var(--ease-spring);
}
.seed-talk-btn:active{transform:scale(0.97)}

/* ===== 航海図 ===== */
.koukai-card{position:relative;margin:0 16px 8px;border-radius:24px;overflow:hidden;box-shadow:0 4px 20px -10px rgba(40,53,48,.3)}
.koukai-sky{position:relative;background:linear-gradient(180deg,#FFF6E4 0%,#FCE7C8 30%,var(--card) 60%);padding:18px 0 0;overflow:hidden}
.koukai-sunrise-glow{position:absolute;left:60%;top:-64px;width:210px;height:210px;background:radial-gradient(circle,rgba(243,194,91,.4),rgba(243,194,91,0) 70%);transform:translateX(-50%);pointer-events:none}
.koukai-sun{position:absolute;left:60%;top:6px;width:26px;height:26px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#FFE7AE,var(--gold));transform:translateX(-50%);box-shadow:0 0 20px rgba(243,194,91,.55)}
.koukai-sparkle{position:absolute;color:var(--gold);opacity:0;animation:kwTwinkle 3.2s ease-in-out infinite;pointer-events:none}
@keyframes kwTwinkle{0%,100%{opacity:0;transform:scale(.6)}50%{opacity:.9;transform:scale(1)}}
.koukai-now-line{position:absolute;left:16px;top:44px;bottom:26px;border-left:2px dashed rgba(21,37,53,.22);z-index:2}
.koukai-now-lbl{position:absolute;left:6px;top:28px;font-size:10px;font-weight:700;color:var(--ink);background:rgba(255,255,255,.85);padding:3px 9px;border-radius:10px;z-index:3;white-space:nowrap}
.koukai-zones{display:flex;padding:0 14px;font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px;position:relative;z-index:2}
.koukai-zones span{flex:1;text-align:center}
.koukai-stems{position:relative;height:206px;padding:0 14px;z-index:2}
.koukai-stem{position:absolute;bottom:0;display:flex;flex-direction:column;align-items:center;cursor:pointer;animation:budSway 5.5s ease-in-out infinite}
.koukai-stem:nth-child(2n){animation-delay:1.4s}
.koukai-stem:nth-child(3n){animation-delay:2.6s}
@keyframes budSway{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.koukai-stem-line{width:2px;background:linear-gradient(180deg,rgba(126,157,136,.55),rgba(126,157,136,.15));margin-top:4px}
.koukai-bud{font-family:'Hiragino Mincho ProN','Noto Serif JP',serif;font-weight:700;white-space:nowrap;border-radius:20px;padding:7px 13px;box-shadow:0 3px 8px rgba(40,53,48,.15);font-size:13px;cursor:pointer}
.koukai-ocean{position:relative;height:78px;overflow:hidden;background:linear-gradient(180deg,#2E6373,#1C3D4A)}
.koukai-ocean svg{position:absolute;left:0;width:200%;height:100%}
.kw-back{top:0;animation:kwDrift 14s linear infinite;opacity:.9}
.kw-mid{top:10px;animation:kwDrift 10s linear infinite reverse;opacity:.85}
.kw-front{top:20px;animation:kwDrift 7s linear infinite}
@keyframes kwDrift{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.koukai-glint{position:absolute;width:4px;height:4px;border-radius:50%;background:rgba(255,231,174,.9);animation:kwGlint 2.6s ease-in-out infinite}
@keyframes kwGlint{0%,100%{opacity:.15}50%{opacity:.85}}
.koukai-fin{position:absolute;bottom:20px;font-size:24px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.25));animation:kwSwim 9s linear infinite;transform:scaleX(-1)}
@keyframes kwSwim{0%{left:-6%;opacity:0}8%{opacity:1}90%{opacity:1}100%{left:100%;opacity:0}}
.koukai-caption{text-align:center;font-size:10px;color:rgba(250,250,247,.7);background:#1C3D4A;padding:8px 0 12px}
.koukai-legend{display:flex;flex-wrap:wrap;gap:10px 14px;justify-content:center;margin:14px 16px 24px}
.koukai-legend-item{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--muted)}
.koukai-legend-dot{width:8px;height:8px;border-radius:50%}

/* ===== あゆみタブ ===== */
.jinsei-header{padding:36px 20px 24px}
.jinsei-title{font-size:22px;font-weight:800;margin-bottom:4px}
.jinsei-sub{font-size:13px;color:var(--muted)}
.timeline{padding:0 20px;margin-bottom:24px}
.tl-chapter{
  background:var(--card);border:1px solid var(--line);border-radius:24px;
  padding:22px 20px;margin-bottom:16px;
  box-shadow:0 4px 16px -10px rgba(40,53,48,.2);
}
.tl-node{display:flex;gap:14px;position:relative}
.tl-node-left{display:flex;flex-direction:column;align-items:center;width:32px;flex-shrink:0}
.tl-dot{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:15px;
}
.tl-dot-talk   {background:linear-gradient(135deg,#e8f0e8,#d0e4d0)}
.tl-dot-event  {background:linear-gradient(135deg,#fdf0d4,#f0dda0)}
.tl-dot-harvest{background:linear-gradient(135deg,#f0e4c8,#e0c898)}
.tl-dot-seed   {background:linear-gradient(135deg,#d4e8d4,#b8d4b8)}
.tl-body{flex:1;padding:5px 0 16px}
.tl-label{font-size:15px;font-weight:700;line-height:1.45;color:var(--ink)}
.tl-sub{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.65}
.tl-bridge{display:flex;align-items:center;gap:12px;padding:2px 0 2px 46px}
.tl-bridge-line{flex:1;height:1px;background:var(--line)}
.tl-bridge-text{font-size:11px;color:var(--muted);white-space:nowrap}

/* ===== ボトムシート ===== */
.sheet-overlay{
  display:none;position:fixed;inset:0;z-index:80;
  background:rgba(14,29,43,.5);backdrop-filter:blur(3px);
}
.sheet-overlay.open{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.bottom-sheet{
  position:fixed;left:0;right:0;bottom:0;
  max-width:390px;margin:0 auto;
  background:var(--cream);border-radius:28px 28px 0 0;
  padding:0 0 calc(36px + env(safe-area-inset-bottom));
  z-index:90;transform:translateY(100%);

@keyframes prepPop{0%{opacity:0;transform:translateY(4px) scale(.6)}25%{opacity:1;transform:translateY(-6px) scale(1.1)}100%{opacity:0;transform:translateY(-20px) scale(1)}}

/* 収穫ボタン(Gold=達成の文脈のみ) */

.find-title,.ayumi-entry-title{font-size:14px;font-weight:700;color:var(--ink)}

.option-card{display:flex;align-items:center;gap:12px;background:var(--ivory);border-radius:14px;padding:15px 14px;margin-bottom:10px;cursor:pointer;min-height:60px;transition:transform .18s var(--ease-spring)}

.letter-para{font-family:'Hiragino Mincho ProN','Noto Serif JP',serif;font-size:15px;line-height:2.1;margin-bottom:18px}

.ios-step-text{font-size:13.5px;line-height:1.6}
.ios-step-ico{font-size:16px}

/* ===== タブバー ===== */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;max-width:390px;margin:0 auto;
  background:rgba(250,250,247,.95);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);display:flex;
  padding:6px 0 calc(10px + env(safe-area-inset-bottom));z-index:60;
}
.tab{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0 4px;color:var(--muted);transition:color .2s;position:relative;min-height:48px}
.tab.active{color:var(--navy)}

.empty-text{font-size:14px;line-height:2}

@media (prefers-reduced-motion: reduce){

}

function getSeedMsg(seed, idx) {
  if (seed.astoMessage) return seed.astoMessage;
  if (seed.category) {
    for (const key of Object.keys(CATEGORY_MSGS)) {
      if (key !== '__default__' && seed.category.includes(key)) return CATEGORY_MSGS[key];
    }
  }
  for (const key of Object.keys(CATEGORY_MSGS)) {
    if (key !== '__default__' && seed.name.includes(key)) return CATEGORY_MSGS[key];
  }
  const defaults = CATEGORY_MSGS['__default__'];
  return defaults[idx % defaults.length];
}

async function loadData() {
  const uid = new URLSearchParams(location.search).get('userId');
  if (uid) {
    try {
      const r = await fetch('/api/calendar-data?userId=' + encodeURIComponent(uid));
      const json = await r.json();
      if (r.ok && (json.userName || (json.futureEvents && json.futureEvents.length > 0))) return json;
    } catch(e) {}
  }
  return DEMO;
}

/* ===== 時間帯 ===== */
function timeContext() {
  const h = new Date().getHours();
  if (h >= 5 && h < 9)   return { sky:'sky-dawn',  greet:'おはよう、',   sub:'今日はどんな一日になるかな。' };
  if (h >= 9 && h < 16)  return { sky:'sky-day',   greet:'こんにちは、', sub:'今日も未来を楽しみにいこう。' };
  if (h >= 16 && h < 19) return { sky:'sky-dusk',  greet:'おかえり、',   sub:'今日もおつかれさま。' };
  return { sky:'sky-night', greet:'こんばんは、', sub:'未来を思い出す時間にしよう。' };
}

/* ===== 日数・時期 ===== */
function whenLabel(date, status) {
  if (!date) return status === 'interest' ? '近いうちに' : 'いつか';
  const m = parseInt(date.split('-')[1], 10);
  if ([12,1,2].includes(m)) return '冬ごろ';
  if ([3,4,5].includes(m))  return '春ごろ';
  if ([6,7,8].includes(m))  return '夏ごろ';
  return '秋ごろ';
}

// e.daysLeft優先。なければdate(YYYY-MM or YYYY-MM-DD)から概算
function daysUntil(e) {
  if (typeof e.daysLeft === 'number') return e.daysLeft;
  if (!e.date) return null;
  const parts = e.date.split('-').map(Number);
  if (!parts[0] || !parts[1]) return null;
  const target = new Date(parts[0], parts[1]-1, parts[2] || 15);
  const diff = Math.ceil((target - new Date()) / 86400000);
  return diff > 0 ? diff : null;
}

function countdownChip(e) {
  const d = daysUntil(e);
  if (d === null) return '';
  if (d <= 60) return '<span class="fc-days">あと' + d + '日</span>';
  return '<span class="fc-days">あと約' + Math.round(d/30) + 'ヶ月</span>';
}

function sceneSnippet(scene) {
  if (!scene) return '';
  return scene.split('\n').filter(l => l.trim()).slice(0,2).join(' ');
}

const FUTURE_CLOSINGS = {
  run: 'あの日の風が待ってるね🌱',
  marathon: 'あの日の風が待ってるね🌱',
  sport: 'その瞬間が楽しみだね😊',

  sushi: '一口目が楽しみだね🍣',
  gourmet: 'どんな味が待ってるかな🍣',
  default: '楽しみだね🌱',
};

function getFutureClosing(event) {
  if (event.closingMessage) return event.closingMessage;
  const text = (event.title + (event.sourceSeed || '')).toLowerCase();
  if (/マラソン|ラン|run/.test(text)) return FUTURE_CLOSINGS.marathon;
  if (/温泉|onsen/.test(text)) return FUTURE_CLOSINGS.onsen;
  if (/旅行|旅|trip/.test(text)) return FUTURE_CLOSINGS.travel;
  if (/寿司|sushi|グルメ|ご飯|食/.test(text)) return FUTURE_CLOSINGS.food;
  if (/スポーツ|sport/.test(text)) return FUTURE_CLOSINGS.sport;
  return FUTURE_CLOSINGS.default;
}

let DATA;

/* ===== 楽しみタブ ===== */
function renderMirai() {
  const tc = timeContext();
  const hero = document.getElementById('hero');
  hero.className = 'hero ' + tc.sky;
  document.getElementById('hero-name').innerHTML = tc.greet + '<br>' + DATA.userName + 'さん';
  document.getElementById('hero-sub').textContent = tc.sub;
  makeSkyDeco(tc.sky);

  const lead = DATA.futureEvents.find(e => e.status === 'scheduled')
             || DATA.futureEvents.find(e => e.status === 'plan');

  const heroMsg = DATA.daily && DATA.daily.heroMessage
    ? DATA.daily.heroMessage.replace(/\n/g, '<br>')
    : (lead
      ? lead.title + '、楽しみだね😊<br><br>今日も少しずつ近づいてるよ🌱'
      : '今日もいい一日だった？😊<br>小さなこと、話してみてね🌱');
  document.getElementById('asto-say-text').innerHTML = heroMsg;

  const hf = document.getElementById('hero-future');
  if (lead) {
    const sceneHtml = lead.scene ? lead.scene.replace(/\n/g,'<br>') : '';
    const d = daysUntil(lead);
    const countHtml = d !== null
      ? '<div class="hf-count"><span class="hf-count-pre">あと</span><span class="hf-count-num">' + (d <= 99 ? d : Math.round(d/30)) + '</span><span class="hf-count-unit">' + (d <= 99 ? '日' : 'ヶ月') + '</span></div>'
      : '';
    hf.innerHTML =
      '<div class="hf-bg">' +
        '<div class="hf-horizon"><div class="hf-horizon-sun"></div><div class="hf-horizon-sea"></div></div>' +
        '<div class="hf-top"><div class="hf-label">✨ いちばん近い未来</div>' + countHtml + '</div>' +
        '<div class="hf-emoji">' + (lead.emoji||'✨') + '</div>' +
        '<div class="hf-name serif">' + lead.title + '</div>' +
        (sceneHtml ? '<div class="hf-scene">' + sceneHtml + '</div>' : '') +
        '<div class="hf-closing">' + getFutureClosing(lead) + '</div>' +
        '<div class="hf-tap-hint">タップして詳しく見る ›</div>' +
      '</div>';
    hf.style.display = 'block';
    hf.onclick = () => openSheet(DATA.futureEvents.indexOf(lead));
  } else {
    hf.style.display = 'none';
  }

  const others = DATA.futureEvents.filter(e => e !== lead);
  const soon  = others.filter(e => ['scheduled','plan','interest'].includes(e.status));
  const dream = others.filter(e => e.status === 'dream');

  let html = '';
  if (soon.length) {
    html += '<div class="future-group reveal" style="animation-delay:.22s">' +
      '<div class="future-group-label">✦ 育ってきた未来</div>' +
      '<div class="future-cards">' + soon.map(futureCardHtml).join('') + '</div></div>';
  }
  if (dream.length) {
    html += '<div class="future-group reveal" style="animation-delay:.28s">' +
      '<div class="future-group-label">🌙 いつかのゆめ</div>' +
      '<div class="future-cards">' + dream.map(futureCardHtml).join('') + '</div></div>';
  }
  if (!lead && !soon.length && !dream.length) {
    html = '<div class="empty reveal"><div class="empty-ico">🫍</div><div class="empty-text">まだ未来はこれから。<br>ASTOと話して、最初の楽しみを見つけよう🌱</div></div>';
  }
  document.getElementById('future-groups').innerHTML = html;
}

function futureCardHtml(e) {
  const idx = DATA.futureEvents.indexOf(e);
  const st = e.status;
  const dailyMsg = DATA.daily && DATA.daily.futureCardMessages && DATA.daily.futureCardMessages[e.title];
  const snippet = dailyMsg || sceneSnippet(e.scene);
  return '<div class="future-card" onclick="openSheet(' + idx + ')" role="button" tabindex="0">' +
    '<div class="fc-emoji fc-emoji-' + st + '">' + (e.emoji||'✨') + '</div>' +
    '<div class="fc-body">' +
      '<div class="fc-title">' + e.title + '</div>' +
      (snippet ? '<div class="fc-snippet">' + snippet + '</div>' : '') +
    '</div>' +
    '<div class="fc-right">' +
      '<div class="fc-badge fc-badge-' + st + '">' + (STATUS_LABEL[st]||st) + '</div>' +
      countdownChip(e) +
      '<div class="fc-arrow">›</div>' +
    '</div>' +
  '</div>';
}

/* 空の演出(星・雲) */
function makeSkyDeco(sky) {
  const h = document.getElementById('hero');
  h.querySelectorAll('.star,.hero-cloud').forEach(el => el.remove());
  let s = '';
  if (sky === 'sky-night' || sky === 'sky-dawn') {
    const n = sky === 'sky-night' ? 26 : 10;
    for (let i = 0; i < n; i++) {
      const sz = Math.random() * 2 + .8;
      s += '<div class="star" style="width:' + sz + 'px;height:' + sz + 'px;left:' + (Math.random()*100) + '%;top:' + (Math.random()*50) + '%;opacity:.6;animation-delay:' + (Math.random()*4) + 's"></div>';
    }
  }
  if (sky === 'sky-day' || sky === 'sky-dusk') {
    for (let i = 0; i < 3; i++) {
      const w = 60 + Math.random()*70;
      s += '<div class="hero-cloud" style="width:' + w + 'px;left:' + (Math.random()*70) + '%;top:' + (14 + Math.random()*30) + '%;animation-delay:-' + (Math.random()*40) + 's"></div>';
    }
  }
  document.getElementById('hero-shoot').style.display = sky === 'sky-night' ? 'block' : 'none';
  h.insertAdjacentHTML('afterbegin', s);
}

/* ===== 育てるタブ ===== */
function stageDots(step) {
  let d = '';
  for (let i = 1; i <= 4; i++) d += '<span class="seed-stage-dot' + (i <= step ? ' on' : '') + '"></span>';
  return '<span class="seed-stage-dots">' + d + '</span>';
}

let sodateRevealed = false;
function renderSodate() {
  const seeds = (DATA.seeds||[]).filter(s => s.stage !== 'harvested');
  if (!seeds.length) {
    document.getElementById('seed-list').innerHTML =
      '<div class="empty"><div class="empty-ico">🌱</div><div class="empty-text">ASTOと話して<br>最初の種を見つけよう</div></div>';
    return;
  }
  document.getElementById('seed-list').innerHTML = seeds.map((s, si) => {
    const st = SEED_STATUS[s.stage] || {ico:'🌱', label:'育ち中', step:1};
    const msg = getSeedMsg(s, si);
    const preps = s.preparations || [];
    const doneCount = preps.filter(p => p.done).length;
    const prepPct = preps.length ? Math.round((doneCount / preps.length) * 100) : 0;
    const prepLine = preps.length
      ? '<div class="seed-prep-line">' + growthIcon(doneCount, preps.length) + '&nbsp;支度<span class="seed-prep-count">' + doneCount + ' / ' + preps.length + '</span></div>' +
        '<div class="seed-prep-bar"><div class="seed-prep-bar-fill" style="width:' + prepPct + '%"></div></div>'
      : '';
    const timingTag = s.roughTiming ? '<span class="seed-timing-tag">' + s.roughTiming + '</span>' : '';
    const revealCls = sodateRevealed ? '' : ' reveal';
    const revealDelay = sodateRevealed ? '' : 'animation-delay:' + (si*0.07+0.05).toFixed(2) + 's';
    return '<div class="seed-card' + revealCls + '" style="' + revealDelay + '">' +
      '<div class="seed-status-bar">' +
        '<span style="font-size:14px">' + st.ico + '</span>' +
        stageDots(st.step) +
        '<span class="seed-status-text">' + st.label + '</span>' +
        timingTag +
      '</div>' +
      '<div class="seed-card-body" onclick="openSeedSheet(' + si + ')" role="button" tabindex="0">' +
        '<div class="seed-name">' + s.name + '</div>' +
        (s.originalWish ? '<div class="seed-wish">' + s.originalWish + '</div>' : '') +
        '<div class="seed-asto-msg">' + msg + '</div>' +
        prepLine +
      '</div>' +
      '<div style="padding:0 20px 18px">' +
        '<button class="seed-talk-btn" data-seed-idx="' + si + '" onclick="handleSeedTalk(this)">🌱&nbsp;&nbsp;この続きを育てる</button>' +
      '</div>' +
    '</div>';
  }).join('');
  sodateRevealed = true;
}

function growthIcon(done, total) {
  if (total === 0 || done === 0) return '🌱';
  if (done === total) return '🌳';
  return '🌿';
}

function handleSeedTalk(btn) {
  const si = parseInt(btn.dataset.seedIdx);
  const seeds = (DATA.seeds||[]).filter(s => s.stage !== 'harvested');
  const seed = seeds[si];
  if (!seed) return;
  copyToClipboardThenLine('「' + seed.name + '」について話したい');
}

/* ===== あゆみタブ ===== */
function renderJinsei() {
  const chapters = [];

  (DATA.harvestedSeeds||[]).forEach(h => {
    const nodes = [];
    if (h.originalWish) nodes.push({cls:'tl-dot-talk', ico:'💬', label:h.originalWish, sub:null, bridge:'その願いが、少しずつ形になって'});
    if (h.futureTitle)  nodes.push({cls:'tl-dot-event', ico:h.emoji||'📅', label:h.futureTitle, sub:null, bridge:'そして'});
    nodes.push({cls:'tl-dot-harvest', ico:'🌾', label:h.harvestNote ? '「' + h.harvestNote + '」' : '実現した', sub:null, bridge: h.nextSeedWish ? 'そこから、また新しい種が芽吹いた' : null});
    if (h.nextSeedWish) nodes.push({cls:'tl-dot-seed', ico:'🌱', label:h.nextSeedWish, sub:null, bridge:null});
    chapters.push(nodes);
  });

  (DATA.seeds||[]).filter(s => s.stage !== 'harvested').forEach(s => {
    const ev = (DATA.futureEvents||[]).find(e => e.sourceSeed === s.name);
    const nodes = [];
    if (s.originalWish) nodes.push({cls:'tl-dot-talk', ico:'💬', label:s.originalWish, sub:null, bridge: ev ? '気づいたら、予定になってたね😊' : null});
    if (ev) nodes.push({cls:'tl-dot-event', ico:ev.emoji||'📅', label:ev.title, sub:whenLabel(ev.date, ev.status) + '・育ち中', bridge:null});
    if (nodes.length) chapters.push(nodes);
  });

  if (!chapters.length) {
    document.getElementById('jinsei-wrap').innerHTML =
      '<div class="empty"><div class="empty-ico">📖</div><div class="empty-text">ASTOと話して<br>最初の一粒をまこう🌱</div></div>';
    return;
  }

  document.getElementById('jinsei-wrap').innerHTML = chapters.map(nodes => {
    const inner = nodes.map((n, i) => {
      const isLast = i === nodes.length - 1;
      return '<div class="tl-node">' +
        '<div class="tl-node-left"><div class="tl-dot ' + n.cls + '">' + n.ico + '</div></div>' +
        '<div class="tl-body"><div class="tl-label">' + n.label + '</div>' + (n.sub ? '<div class="tl-sub">' + n.sub + '</div>' : '') + '</div>' +
      '</div>' +
      (!isLast && n.bridge
        ? '<div class="tl-bridge"><div class="tl-bridge-line"></div><div class="tl-bridge-text">' + n.bridge + '</div><div class="tl-bridge-line"></div></div>'
        : (!isLast ? '<div class="tl-bridge"><div class="tl-bridge-line"></div></div>' : '')
      );
    }).join('');
    return '<div class="tl-chapter">' + inner + '</div>';
  }).join('');
}

/* ===== ボトムシート ===== */
function openSheet(idx) {
  const e = DATA.futureEvents[idx];
  if (!e) return;

  const d = daysUntil(e);
  const when = d !== null ? 'あと ' + d + ' 日' : whenLabel(e.date, e.status);
  const statusLabel = STATUS_LABEL[e.status] || e.status;

function copyText(text, btn, done, reset) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      btn.innerHTML = done;
      setTimeout(() => { btn.innerHTML = reset; }, 2000);
    });
  } else {
    const el = document.createElement('textarea');
    el.value = text; el.style.position = 'fixed'; el.style.opacity = '0';
    document.body.appendChild(el); el.focus(); el.select();
    document.execCommand('copy'); document.body.removeChild(el);
    btn.innerHTML = done;
    setTimeout(() => { btn.innerHTML = reset; }, 2000);
  }
}

/* シート:指に追従して閉じる */
(function() {
  const sheet = document.getElementById('bottom-sheet');
  let startY = 0, curY = 0, dragging = false;
  sheet.addEventListener('touchstart', e => {
    if (sheet.scrollTop > 2) return;
    startY = e.touches[0].clientY; curY = startY; dragging = true;
    sheet.classList.add('dragging');
  }, {passive:true});
  sheet.addEventListener('touchmove', e => {
    if (!dragging) return;
    curY = e.touches[0].clientY;
    const dy = Math.max(0, curY - startY);
    sheet.style.transform = 'translateY(' + dy + 'px)';
  }, {passive:true});
  sheet.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    sheet.classList.remove('dragging');
    const dy = curY - startY;
    if (dy > 90) { closeSheet(); }
    else { sheet.style.transform = ''; }
  }, {passive:true});
})();

function seedHue(name) {
  let h = 0; for (let i=0;i<name.length;i++) h = (h*31 + name.charCodeAt(i)) % 997;
  return h;
}

const TIMING_ZONE = {'今月中':0, '数ヶ月以内':1, '今年中には':2, 'いつか':3};
function guessZone(seed) {
  if (seed.roughTiming && TIMING_ZONE[seed.roughTiming] !== undefined) return TIMING_ZONE[seed.roughTiming];
  const stage = seed.stage;
  if (stage === 'booked') return 2;
  if (stage === 'planning') return 1;
  if (stage === 'interested') return 2;
  return 3;
}

const CAT_COLOR = {
  '旅行・暮らし': {bg:'rgba(126,157,136,.18)', fg:'var(--sage-d)'},
  '体を動かす':   {bg:'rgba(201,123,74,.18)',  fg:'#a15b2e'},
  '創作':         {bg:'rgba(243,194,91,.22)',  fg:'var(--gold-d)'},
  'キャリア':     {bg:'rgba(21,37,53,.1)',     fg:'var(--navy)'},
};
function seedColor(seed) {
  if (seed.category && CAT_COLOR[seed.category]) return CAT_COLOR[seed.category];
  const hue = seedHue(seed.name) % 4;
  return {
    bg: ['rgba(126,157,136,.18)','rgba(201,123,74,.18)','rgba(243,194,91,.22)','rgba(21,37,53,.1)'][hue],
    fg: ['var(--sage-d)','#a15b2e','var(--gold-d)','var(--navy)'][hue],
  };
}

function renderKoukaizu() {

  let growthIco = '🌱', growthMsg;

  else if (done === 0) { growthIco = '🌱'; growthMsg = 'まだ支度は始まったばかりです'; }
  else if (done === preps.length) { growthIco = '🌳'; growthMsg = 'もう準備は整ってるみたいですね'; }
  else { growthIco = '🌿'; growthMsg = '支度が' + done + 'つ、育ってきています'; }

  const items = preps.map((p, pi) => {
    const dateChip = p.date
      ? '<span class="prep-date" onclick="event.stopPropagation();editPrepDate(' + pi + ')">📅 ' + fmtPrepDate(p.date) + '</span>'

      '<div class="prep-check">' + (p.done ? '✓' : '') + '</div>' +

let FEED = [];

async function loadFeed() {
  const uid = new URLSearchParams(location.search).get('userId');
  try {
    const r = await fetch('/api/feed' + (uid ? '?userId=' + encodeURIComponent(uid) : ''));
    if (r.ok) {
      const json = await r.json();
      if (json && Array.isArray(json.items) && json.items.length) return json.items;
    }
  } catch(e) {}
  return DEMO_FEED;
}

function feedAgo(item) {
  if (item.ago) return item.ago;
  if (!item.at) return '';
  const diff = Date.now() - new Date(item.at).getTime();
  const h = Math.floor(diff / 3600000);
  if (h < 1) return 'さっき';
  if (h < 24) return '今日';
  const d = Math.floor(h / 24);
  if (d === 1) return '昨日';
  return d + '日前';
}

    const t = FEED_TYPE[f.type] || FEED_TYPE.seed;
    const cardCls = f.type === 'harvest' ? ' feed-card-harvest' : '';
    return '<div class="feed-card' + cardCls + (i < 6 ? ' reveal' : '') + '" style="' + (i < 6 ? 'animation-delay:' + (i*0.06+0.05).toFixed(2) + 's' : '') + '" onclick="openFeedSheet(' + i + ')" role="button" tabindex="0">' +
      '<div class="feed-emoji feed-emoji-' + (FEED_TYPE[f.type] ? f.type : 'seed') + '">' + escapeHtml(f.emoji || t.ico) + '</div>' +
      '<div class="feed-body">' +
        '<div class="feed-meta"><b>' + t.ico + ' ' + t.verb + '</b><span>・' + escapeHtml(feedAgo(f)) + '</span></div>' +
        '<div class="feed-title">' + escapeHtml(f.title) + '</div>' +
        (f.words ? '<div class="feed-words">' + escapeHtml(f.words) + '</div>' : '') +
      '</div>' +
      '<div class="fc-arrow" style="align-self:center">›</div>' +
    '</div>';
  }).join('');
  end.style.display = 'block';
}

function openFeedSheet(i) {
  const f = FEED[i];
  if (!f) return;
  const t = FEED_TYPE[f.type] || FEED_TYPE.seed;

  const leadText = f.type === 'harvest'
    ? 'どこかの誰かの楽しみが、ひとつ叶いました🌾'
    : (f.type === 'growth'
      ? 'どこかで、この種が少しずつ育っています🌿'
      : 'どこかで、こんな種が芽吹きました🌱');

  const wordsHtml = f.words
    ? '<div class="bs-soyeba">' +
        '<div class="bs-soyeba-lead">こんな言葉から生まれた種です</div>' +
        '<div class="bs-soyeba-wish">' + escapeHtml(f.words) + '</div>' +
      '</div>'
    : '';

  document.getElementById('bs-body').innerHTML =
    '<div class="bs-hero">' +
      '<div class="bs-emoji">' + escapeHtml(f.emoji || t.ico) + '</div>' +
      '<div class="bs-title">' + escapeHtml(f.title) + '</div>' +
      '<div class="bs-tags"><span class="bs-tag-status">' + t.ico + ' ' + t.verb + '・' + escapeHtml(feedAgo(f)) + '</span></div>' +
    '</div>' +
    '<div style="font-size:14px;color:var(--muted);line-height:2;margin-bottom:16px">' + leadText + '</div>' +
    wordsHtml +
    '<div style="font-size:13px;color:var(--muted);line-height:1.9;margin-bottom:16px;padding:0 2px">ちょっと気になったら、あなたの種にしてもいいんだよ😊</div>' +
    '<div class="bs-divider"></div>' +
    '<button class="bs-talk-btn" onclick="adoptFeedSeed(' + i + ')">🌱&nbsp;&nbsp;わたしも育てたい</button>';

  showSheet();
}

function adoptFeedSeed(i) {
  const f = FEED[i];
  if (!f) { openLine(); return; }
  copyToClipboardThenLine('「' + f.title + '」、わたしも気になる。育ててみたい🌱');
}

/* ===== PWA: Service Worker登録 + ホーム画面追加導線 =====
   方針: 押しつけない。1回見せて「あとで」を押されたら14日は出さない。
   すでにホーム画面から起動している場合(standalone)は一切出さない。 */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}

function isStandalone() {
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}
function isIOS() {
  return /iphone|ipad|ipod/i.test(navigator.userAgent);
}
function isAndroid() {
  return /android/i.test(navigator.userAgent);
}
function isInLineApp() {
  // LINEの内蔵ブラウザ(IAB)を検知。ここではbeforeinstallpromptが発火せず、
  // Safari/Chromeの共有シートも出せないため、まず外のブラウザに出てもらう必要がある。
  return /\bLine\//i.test(navigator.userAgent);
}

let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  maybeShowInstallBanner();
});

function installDismissedRecently() {
  const t = localStorage.getItem('astome_install_dismissed_at');
  if (!t) return false;
  return (Date.now() - parseInt(t, 10)) < 14 * 24 * 3600 * 1000;
}

function maybeShowInstallBanner() {
  if (isStandalone() || installDismissedRecently()) return;
  const slot = document.getElementById('install-banner-slot');
  if (!slot || slot.childElementCount) return;

  const inLine = isInLineApp();

  // 表示条件:
  // - LINEの中にいる場合は常に(まずブラウザに出る案内として)表示
  // - iOSのSafari等では常に(手順案内として)表示
  // - Android Chrome等ではネイティブのインストールプロンプトが使える場合のみ表示
  if (!inLine && !isIOS() && !deferredInstallPrompt) return;

  const sub = inLine
    ? 'まずはブラウザで開くところから始めるよ'
    : 'アイコンから、いつでもすぐ開けるようになるよ';
  const btnLabel = (!inLine && deferredInstallPrompt) ? '追加する' : 'やり方を見る';

  slot.innerHTML =
    '<div class="install-banner reveal" style="animation-delay:.1s">' +
      '<div class="install-banner-ico">🫍</div>' +
      '<div class="install-banner-body">' +
        '<div class="install-banner-title">ホーム画面に置いておく？</div>' +
        '<div class="install-banner-sub">' + sub + '</div>' +
      '</div>' +
      '<div class="install-banner-actions">' +
        '<button class="install-banner-btn" onclick="handleInstallClick()">' + btnLabel + '</button>' +
        '<button class="install-banner-close" onclick="dismissInstallBanner()">あとで</button>' +
      '</div>' +
    '</div>';
}

function dismissInstallBanner() {
  localStorage.setItem('astome_install_dismissed_at', String(Date.now()));
  const slot = document.getElementById('install-banner-slot');
  if (slot) slot.innerHTML = '';
}

async function handleInstallClick() {
  if (isInLineApp()) {
    openInstallGuideSheet();
    return;
  }
  if (deferredInstallPrompt) {
    deferredInstallPrompt.prompt();
    try { await deferredInstallPrompt.userChoice; } catch(e) {}
    deferredInstallPrompt = null;
    dismissInstallBanner();
    return;
  }
  if (isIOS()) {
    openInstallGuideSheet();
  }
}

function installSteps() {
  const inLine = isInLineApp();
  if (inLine && isIOS()) {
    return [
      ['\ud83d\udcac', '画面下の「…」をタップ'],
      ['\ud83c\udf10', '「ブラウザで開く」を選ぶ'],
      ['\u2b06\ufe0f', 'Safariが開いたら、下の「共有」ボタンをタップ'],
      ['\u2795', '「ホーム画面に追加」を選ぶ'],
      ['\u2705', '右上の「追加」をタップ'],
    ];
  }
  if (inLine && isAndroid()) {
    return [
      ['\ud83d\udcac', '画面右上の「⋮」をタップ'],
      ['\ud83c\udf10', '「ブラウザで開く」を選ぶ'],
      ['⋮', 'Chromeが開いたら、右上の「⋮」をタップ'],
      ['\u2795', '「アプリをインストール」を選ぶ'],
    ];
  }
  if (inLine) {
    return [
      ['\ud83d\udcac', '画面の「…」または「⋮」をタップ'],
      ['\ud83c\udf10', '「ブラウザで開く」を選ぶ'],
      ['\u2795', '開いたブラウザのメニューから「ホーム画面に追加」を選ぶ'],
    ];
  }
  return [
    ['\u2b06\ufe0f', '画面下の「共有」ボタンをタップ'],
    ['\u2795', '「ホーム画面に追加」を選ぶ'],
    ['\u2705', '右上の「追加」をタップ'],
  ];
}

function openInstallGuideSheet() {
  const steps = installSteps();
  const stepsHtml = steps.map((s, i) =>
    '<div class="ios-step"><div class="ios-step-num">' + (i+1) + '</div><div class="ios-step-text"><span class="ios-step-ico">' + s[0] + '</span>&nbsp; ' + s[1] + '</div></div>'
  ).join('');
  const lead = isInLineApp()
    ? 'LINEのアプリ内ブラウザからは直接置けないので、一度外のブラウザに出てから追加します'
    : steps.length + 'ステップで、アイコンからすぐ開けるようになります';

  document.getElementById('bs-body').innerHTML =
    '<div class="bs-hero"><div class="bs-emoji">\ud83e\udecd</div>' +
    '<div class="bs-title">ホーム画面に追加</div>' +
    '<div style="font-size:12.5px;color:var(--muted);margin-top:6px">' + lead + '</div></div>' +
    '<div class="ios-steps">' + stepsHtml + '</div>' +
    '<div style="font-size:13px;color:var(--muted);line-height:1.9;margin:16px 0 4px;padding:0 2px">これで、ASTOmeがホーム画面のアイコンから開けるようになるよ\ud83d\ude0a</div>' +
    '<button class="bs-talk-btn" onclick="closeSheet();dismissInstallBanner()">わかった\ud83c\udf31</button>';
  showSheet();
}

/* ===== 起動 ===== */
(async () => {
  DATA = await loadData();
  document.getElementById('skeleton').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderMirai();
  renderSodate();
  renderKoukaizu();
  renderJinsei();
  // iOSはbeforeinstallpromptが発火しない。LINE内ブラウザも同様に発火しないため、
  // どちらの場合も画面が落ち着いてから案内を出す
  if (isIOS() || isInLineApp()) setTimeout(maybeShowInstallBanner, 1200);
  // うみタブは後追いで読み込み(ホーム表示をブロックしない)
  FEED = await loadFeed();
  renderUmi();
})();
</script>
