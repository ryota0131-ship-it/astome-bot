<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ASTOme</title>
<style>
:root {
  --navy:#0E1D2B; --gold:#F3C25B; --gold-d:#c8902f;
  --cream:#FAFAF7; --ivory:#F4EEDC; --sage:#7E9D88; --sage-d:#5d7a67;
  --ink:#2b3530; --muted:#8a968e; --line:#e8e2d4; --card:#fbf8f1;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--cream);color:var(--ink);
  font-family:-apple-system,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  max-width:390px;margin:0 auto;
  padding-bottom:calc(84px + env(safe-area-inset-bottom));
  line-height:1.8;
}
.serif{font-family:'Hiragino Mincho ProN','Noto Serif JP',Georgia,serif}
.screen{display:none}
.screen.active{display:block;animation:up .35s ease}
@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ヒーロー */
.hero{
  position:relative;padding:52px 24px 80px;
  background:linear-gradient(180deg,#1a2d44 0%,#294760 45%,#d8b28d 85%,#f5e8d8 100%);
  color:var(--cream);overflow:hidden;
}
.star{position:absolute;background:#fff;border-radius:50%;animation:tw 4s ease-in-out infinite}
@keyframes tw{0%,100%{opacity:.15}50%{opacity:.85}}
.shoot{position:absolute;top:48px;left:58%;width:60px;height:1px;background:linear-gradient(90deg,transparent,#fff);transform:rotate(22deg);opacity:.6}
.hero-brand{font-size:16px;font-weight:700;letter-spacing:.18em;opacity:.65}
.hero-brand b{color:var(--gold)}
.hero-name{font-size:27px;font-weight:700;line-height:1.4;margin-top:22px}
.hero-sub{font-size:14px;opacity:.68;margin-top:8px}
.hero-asto{
  position:absolute;right:18px;bottom:62px;
  width:88px;height:88px;border-radius:50%;
  background:radial-gradient(circle at 38% 32%,#2a4660,#0b1822);
  box-shadow:0 0 0 2px rgba(243,194,91,.35),0 10px 28px -10px rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;font-size:43px;
  animation:bob 5s ease-in-out infinite;
  overflow:hidden;
}
  .hero-asto img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center 30%;
}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.sheet{margin-top:-44px;padding:0 16px;position:relative;z-index:2}

/* ASTOの一言 */
.asto-say{
  background:var(--card);border:1px solid var(--line);border-radius:20px;
  padding:14px 16px 18px 18px;
  display:flex;align-items:flex-start;gap:13px;
  box-shadow:0 6px 24px -14px rgba(40,53,48,.5);margin-bottom:20px;
}
.asto-ico{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 38% 32%,#2a4660,#0b1822);
  box-shadow:0 0 0 1.5px rgba(243,194,91,.28);
  display:flex;align-items:center;justify-content:center;font-size:19px;
}
  .asto-ico img{

  width:100%;

  height:100%;

  object-fit:contain;

  display:block;

}
.asto-say-text{font-size:15px;line-height:1.95;padding-top:1px}

/* ヒーローカード */
.hero-future{
  border-radius:24px;overflow:hidden;margin-bottom:20px;
  box-shadow:0 8px 36px -12px rgba(14,29,43,.4);
  cursor:pointer;transition:transform .15s;
}
.hero-future:active{transform:scale(0.98)}
.hf-bg{
  background:linear-gradient(145deg,#1a2d44 0%,#223c58 55%,#2e5572 100%);
  padding:28px 26px 28px;color:var(--cream);
}
.hf-label{font-size:11px;font-weight:700;letter-spacing:.14em;opacity:.5;margin-bottom:16px}
.hf-emoji{font-size:42px;line-height:1;margin-bottom:14px}
.hf-name{font-size:30px;font-weight:800;line-height:1.2;margin-bottom:20px}
.hf-scene{
  font-size:15px;line-height:2.1;opacity:.92;
  padding-top:18px;border-top:1px solid rgba(255,255,255,.1);
}
.hf-tap-hint{font-size:11px;opacity:.3;margin-top:14px;text-align:right}

/* 未来カード（グループ） */
.future-group{margin-bottom:24px}
.future-group-label{
  font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.12em;
  margin:0 4px 10px;display:flex;align-items:center;gap:6px;
}
.future-cards{display:flex;flex-direction:column;gap:10px}
.future-card{
  background:var(--card);border:1px solid var(--line);border-radius:20px;
  padding:16px 18px;cursor:pointer;
  display:flex;align-items:center;gap:14px;
  box-shadow:0 4px 16px -10px rgba(40,53,48,.28);transition:transform .15s;
}
.future-card:active{transform:scale(0.98)}
.fc-emoji{
  width:48px;height:48px;border-radius:16px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:24px;
}
.fc-emoji-scheduled{background:linear-gradient(135deg,#1a2d44,#2a4a6a)}
.fc-emoji-plan     {background:linear-gradient(135deg,#3d6b4f,#5a8c68)}
.fc-emoji-interest {background:linear-gradient(135deg,#6b5a2a,#8c7a3a)}
.fc-emoji-dream    {background:linear-gradient(135deg,#3a3a4a,#555568)}
.fc-body{flex:1;min-width:0}
.fc-title{font-size:15px;font-weight:700;line-height:1.3}
.fc-snippet{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.fc-badge{font-size:10px;font-weight:700;border-radius:999px;padding:2px 8px;flex-shrink:0}
.fc-badge-scheduled{background:rgba(243,194,91,.18);color:var(--gold-d)}
.fc-badge-plan     {background:rgba(126,157,136,.18);color:var(--sage-d)}
.fc-badge-interest {background:rgba(180,160,100,.12);color:#7a6a30}
.fc-badge-dream    {background:rgba(100,100,120,.1);color:var(--muted)}
.fc-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.fc-arrow{font-size:14px;color:var(--muted);opacity:.4}

/* FAB */
.fab{
  position:fixed;right:20px;bottom:calc(76px + env(safe-area-inset-bottom));
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,#2a4a3a,#1a2d44);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px -4px rgba(14,29,43,.35),0 0 0 1.5px rgba(243,194,91,.25);
  z-index:50;transition:transform .15s;
  flex-direction:column;gap:1px;
}
.fab:active{transform:scale(0.93)}
.fab-whale{

  width:42px;

  height:42px;

  display:flex;

  align-items:center;

  justify-content:center;

  line-height:1;

}

.fab-whale img{

  width:100%;

  height:100%;

  object-fit:contain;

  display:block;

}
.fab-dots{font-size:9px;letter-spacing:2px;color:var(--cream);height:12px;display:flex;align-items:center;gap:2px}
.fab-dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.5);animation:dotpulse 1.4s ease-in-out infinite}
.fab-dot:nth-child(1){animation-delay:0s}
.fab-dot:nth-child(2){animation-delay:.2s}
.fab-dot:nth-child(3){animation-delay:.4s}
@keyframes dotpulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* 育てるタブ */
.sodate-header{padding:36px 20px 20px}
.sodate-title{font-size:22px;font-weight:800;margin-bottom:4px}
.sodate-sub{font-size:13px;color:var(--muted)}
.seed-cards{padding:0 16px;display:flex;flex-direction:column;gap:16px;margin-bottom:24px}
.seed-card{
  background:var(--card);border:1px solid var(--line);border-radius:24px;
  overflow:hidden;box-shadow:0 4px 20px -10px rgba(40,53,48,.2);
}
.seed-status-bar{
  padding:10px 20px;
  display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--line);
}
.seed-status-ico{font-size:14px}
.seed-status-text{font-size:12px;font-weight:700;color:var(--muted)}
.seed-card-body{padding:18px 20px 20px}
.seed-name{font-size:17px;font-weight:800;line-height:1.3;margin-bottom:12px}
.seed-wish{
  padding:13px 15px;background:var(--ivory);border-radius:14px;
  font-size:14px;color:var(--ink);line-height:1.8;font-style:italic;margin-bottom:14px;
}
.seed-wish::before{content:'💬 ';font-style:normal}
.seed-asto-msg{font-size:14px;color:var(--muted);line-height:1.85;margin-bottom:16px}
.seed-talk-btn{
  width:100%;background:var(--navy);color:var(--cream);border:none;
  border-radius:999px;padding:13px;font-size:14px;font-weight:700;
  font-family:inherit;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:transform .15s;
}
.seed-talk-btn:active{transform:scale(0.98)}
.seed-prep-line{font-size:12px;color:var(--sage-d);font-weight:700;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
.seed-prep-bar{height:4px;background:var(--line);border-radius:2px;overflow:hidden;margin-top:8px}
.seed-prep-bar-fill{height:100%;background:var(--sage);border-radius:2px;transition:width .3s ease}
.seed-timing-tag{font-size:10px;font-weight:700;color:var(--gold-d);background:rgba(243,194,91,.15);border-radius:999px;padding:2px 10px;margin-left:auto}

/* あゆみタブ */
.jinsei-header{padding:36px 20px 24px}
.jinsei-title{font-size:22px;font-weight:800;margin-bottom:4px}
.jinsei-sub{font-size:13px;color:var(--muted)}
.timeline{padding:0 20px;margin-bottom:24px}
.tl-chapter{
  background:var(--card);border:1px solid var(--line);border-radius:24px;
  padding:22px 20px;margin-bottom:16px;
  box-shadow:0 4px 16px -10px rgba(40,53,48,.2);
}
.tl-node{display:flex;gap:14px;position:relative}
.tl-node + .tl-node{margin-top:0}
.tl-node-left{display:flex;flex-direction:column;align-items:center;width:32px;flex-shrink:0}
.tl-dot{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:15px;
}
.tl-dot-talk   {background:linear-gradient(135deg,#e8f0e8,#d0e4d0)}
.tl-dot-event  {background:linear-gradient(135deg,#fdf0d4,#f0dda0)}
.tl-dot-harvest{background:linear-gradient(135deg,#f0e4c8,#e0c898)}
.tl-dot-seed   {background:linear-gradient(135deg,#d4e8d4,#b8d4b8)}
.tl-connector{
  flex:1;display:flex;align-items:center;gap:0;
  padding:10px 0;
}
.tl-connector-line{width:1px;height:100%;background:var(--line);margin:0 auto}
.tl-body{flex:1;padding:5px 0 16px}
.tl-label{font-size:15px;font-weight:700;line-height:1.45;color:var(--ink)}
.tl-sub{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.65}
/* 矢印の代わり：テキストの橋 */
.tl-bridge{
  display:flex;align-items:center;gap:12px;
  padding:2px 0 2px 46px;margin:0 0 0;
}
.tl-bridge-line{flex:1;height:1px;background:var(--line)}
.tl-bridge-text{font-size:11px;color:var(--muted);white-space:nowrap}

/* ボトムシート */
.sheet-overlay{
  display:none;position:fixed;inset:0;z-index:80;
  background:rgba(14,29,43,.5);backdrop-filter:blur(3px);
}
.sheet-overlay.open{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.bottom-sheet{
  position:fixed;left:0;right:0;bottom:0;
  max-width:390px;margin:0 auto;
  background:var(--cream);border-radius:28px 28px 0 0;
  padding:0 0 calc(36px + env(safe-area-inset-bottom));
  z-index:90;transform:translateY(100%);
  transition:transform .32s cubic-bezier(.32,1,.42,1);
  box-shadow:0 -8px 40px -8px rgba(14,29,43,.25);
  max-height:90vh;overflow-y:auto;
}
.bottom-sheet.open{transform:translateY(0)}
.bs-handle{width:36px;height:4px;border-radius:2px;background:var(--line);margin:14px auto 0}
.bs-body{padding:24px 22px 0}

.bs-hero{margin-bottom:18px}
.bs-emoji{font-size:36px;line-height:1;margin-bottom:10px}
.bs-title{font-size:24px;font-weight:800;line-height:1.2;margin-bottom:10px}
.bs-tags{display:flex;gap:6px;flex-wrap:wrap}
.bs-tag-when{font-size:13px;font-weight:700;color:var(--gold-d);background:rgba(243,194,91,.15);border:1px solid rgba(243,194,91,.35);border-radius:999px;padding:3px 12px}
.bs-tag-status{font-size:12px;color:var(--muted);background:var(--ivory);border-radius:999px;padding:3px 10px}

.bs-asto{
  background:linear-gradient(145deg,#1a2d44,#223c58);
  border-radius:18px;padding:18px 20px;margin-bottom:16px;color:var(--cream);
  display:flex;gap:12px;align-items:flex-start;
}
.bs-asto-ico{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 38% 32%,#3a6080,#1a3048);
  box-shadow:0 0 0 1.5px rgba(243,194,91,.3);
  display:flex;align-items:center;justify-content:center;font-size:15px;
}
.bs-asto-text{font-size:14px;line-height:2;opacity:.92}

/* そういえばセクション */
.bs-soyeba{
  margin-bottom:16px;padding:16px 18px;
  background:var(--ivory);border:1px solid var(--line);border-radius:16px;
}
.bs-soyeba-lead{font-size:13px;color:var(--muted);margin-bottom:8px}
.bs-soyeba-wish{font-size:15px;line-height:1.8;color:var(--ink);font-style:italic}
.bs-soyeba-wish::before{content:'「';font-style:normal}
.bs-soyeba-wish::after{content:'」';font-style:normal}

.bs-divider{height:1px;background:var(--line);margin:4px 0 16px}
.bs-copy-text{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 16px;font-size:14px;color:var(--ink);line-height:1.6;margin-bottom:8px}
.bs-copy-btn{width:100%;background:none;border:1.5px solid var(--sage);color:var(--sage-d);border-radius:999px;padding:11px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:10px}
.bs-talk-btn{width:100%;background:var(--navy);color:var(--cream);border:none;border-radius:999px;padding:15px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}

/* 種シート：目安の時期＋支度 */
.bs-timing{display:inline-block;font-size:12px;font-weight:700;color:var(--sage-d);background:rgba(126,157,136,.14);border:1px solid rgba(126,157,136,.3);border-radius:999px;padding:3px 12px}
.bs-shitaku-head{display:flex;align-items:center;gap:7px;margin:20px 0 10px}
.bs-shitaku-ico{font-size:16px}
.bs-shitaku-label{font-size:12px;font-weight:700;color:var(--muted)}
.prep-list{display:flex;flex-direction:column;gap:6px;margin-bottom:6px}
.prep-item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:12px;background:var(--card);border:1px solid var(--line);cursor:pointer}
.prep-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--sage);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;font-size:12px;color:#fff;transition:all .15s}
.prep-item.done .prep-check{background:var(--sage);border-color:var(--sage)}
.prep-text{font-size:14px;color:var(--ink);line-height:1.6}
.prep-item.done .prep-text{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--sage)}
.prep-add{display:flex;align-items:center;gap:8px;margin:6px 0 4px;padding:11px 13px;border-radius:12px;border:1.5px dashed var(--line);color:var(--muted);font-size:13px;cursor:pointer}

/* タブ */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;max-width:390px;margin:0 auto;
  background:rgba(250,250,247,.95);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);display:flex;
  padding:6px 0 calc(10px + env(safe-area-inset-bottom));z-index:60;
}
.tab{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;font-family:inherit;color:var(--muted);transition:color .2s;position:relative}
.tab.active{color:var(--navy)}
.tab.active::before{content:'';position:absolute;top:0;width:18px;height:2.5px;border-radius:0 0 3px 3px;background:var(--gold)}
.tab-ico{

  font-size:20px;

  line-height:1;

}

.tab-lbl{

  font-size:10px;

  font-weight:700;

  letter-spacing:.04em;

}

/* ←ここに追加 */

.tab-asto{

  width:22px;

  height:22px;

  display:flex;

  align-items:center;

  justify-content:center;

}

.tab-asto img{

  width:100%;

  height:100%;

  object-fit:contain;

  display:block;

  transition:transform .2s ease;

}

.tab.active .tab-asto img{

  transform:scale(1.1);

}
.tab-lbl{font-size:10px;font-weight:700;letter-spacing:.04em}

/* ===== 今日追加：育てるタブ 表示切替 ===== */
.view-switch{display:flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:4px;margin:0 16px 18px}
.view-btn{flex:1;text-align:center;padding:9px 0;border-radius:999px;border:none;background:none;font-family:inherit;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer}
.view-btn.active{background:var(--navy);color:var(--gold)}
.view-pane{display:none}
.view-pane.active{display:block}

/* マップ表示（種のことば雲） */
.seed-map-card{margin:0 16px 16px;background:linear-gradient(180deg,#FFFDF7,var(--card));border:1px solid var(--line);border-radius:22px;padding:26px 16px;min-height:220px;display:flex;align-items:center;justify-content:center}
.seed-map-field{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:12px 14px}
.seed-word{font-family:'Hiragino Mincho ProN','Noto Serif JP',serif;font-weight:700;line-height:1;white-space:nowrap;cursor:pointer;border-radius:20px;padding:6px 12px}
.sw-discovered{font-size:13px;opacity:.75;background:rgba(126,157,136,.12);color:var(--sage-d)}
.sw-interested{font-size:17px;background:rgba(126,157,136,.18);color:var(--sage-d)}
.sw-planning{font-size:23px;background:rgba(243,194,91,.2);color:var(--gold-d)}
.sw-booked{font-size:27px;font-weight:800;background:rgba(243,194,91,.3);color:var(--gold-d)}
.seed-map-legend{margin:0 16px 24px;font-size:11px;color:var(--muted);text-align:center}

/* 航海図 */
.koukai-card{position:relative;margin:0 16px 8px;border-radius:24px;overflow:hidden;box-shadow:0 4px 20px -10px rgba(40,53,48,.3)}
.koukai-sky{position:relative;background:linear-gradient(180deg,#FFF6E4 0%,#FCE7C8 30%,var(--card) 60%);padding:18px 0 0;overflow:hidden}
.koukai-sunrise-glow{position:absolute;left:60%;top:-64px;width:210px;height:210px;background:radial-gradient(circle,rgba(243,194,91,.4),rgba(243,194,91,0) 70%);transform:translateX(-50%);pointer-events:none}
.koukai-sun{position:absolute;left:60%;top:6px;width:26px;height:26px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#FFE7AE,var(--gold));transform:translateX(-50%);box-shadow:0 0 20px rgba(243,194,91,.55)}
.koukai-sparkle{position:absolute;color:var(--gold);opacity:0;animation:kwTwinkle 3.2s ease-in-out infinite;pointer-events:none}
@keyframes kwTwinkle{0%,100%{opacity:0;transform:scale(.6)}50%{opacity:.9;transform:scale(1)}}
.koukai-now-line{position:absolute;left:16px;top:44px;bottom:26px;border-left:2px dashed rgba(21,37,53,.22);z-index:2}
.koukai-now-lbl{position:absolute;left:6px;top:28px;font-size:10px;font-weight:700;color:var(--ink);background:rgba(255,255,255,.85);padding:3px 9px;border-radius:10px;z-index:3;white-space:nowrap}
.koukai-zones{display:flex;padding:0 14px;font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px;position:relative;z-index:2}
.koukai-zones span{flex:1;text-align:center}
.koukai-stems{position:relative;height:206px;padding:0 14px;z-index:2}
.koukai-stem{position:absolute;bottom:0;display:flex;flex-direction:column;align-items:center;cursor:pointer}
.koukai-stem-line{width:2px;background:linear-gradient(180deg,rgba(126,157,136,.55),rgba(126,157,136,.15));margin-top:4px}
.koukai-bud{font-family:'Hiragino Mincho ProN','Noto Serif JP',serif;font-weight:700;white-space:nowrap;border-radius:20px;padding:6px 12px;box-shadow:0 3px 8px rgba(40,53,48,.15);font-size:13px;cursor:pointer}

.kw-mid{top:10px;animation:kwDrift 10s linear infinite reverse;opacity:.85}
.kw-front{top:20px;animation:kwDrift 7s linear infinite;opacity:1}

.koukai-glint{position:absolute;width:4px;height:4px;border-radius:50%;background:rgba(255,231,174,.9);animation:kwGlint 2.6s ease-in-out infinite}

.koukai-caption{text-align:center;font-size:10px;color:rgba(250,250,247,.7);background:#1C3D4A;padding:8px 0 12px}

.prep-check{width:19px;height:19px;border-radius:50%;border:2px solid var(--sage);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;font-size:11px;color:#fff}
.prep-item.done .prep-check{background:var(--sage)}
.prep-item.done .prep-text{color:var(--muted);text-decoration:line-through}

/* 探す機能・あゆみの記録 入口カード */
.find-card,.ayumi-entry{margin:4px 16px 24px;background:var(--card);border:1.5px dashed var(--sage);border-radius:18px;padding:16px 17px;display:flex;align-items:center;gap:13px;cursor:pointer}
.find-ico,.ayumi-ico{width:38px;height:38px;border-radius:12px;background:var(--ivory);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

function getSeedMsg(seed, idx) {
  // astoMessageが保存されていれば最優先（AI生成のその人専用の言葉）
  if (seed.astoMessage) return seed.astoMessage;
  // カテゴリで分岐（フォールバック）
  if (seed.category) {
    for (const key of Object.keys(CATEGORY_MSGS)) {
      if (key !== '__default__' && seed.category.includes(key)) return CATEGORY_MSGS[key];
    }
  }
  // 種名でもマッチ（フォールバック）
  for (const key of Object.keys(CATEGORY_MSGS)) {
    if (key !== '__default__' && seed.name.includes(key)) return CATEGORY_MSGS[key];
  }
  const defaults = CATEGORY_MSGS['__default__'];
  return defaults[idx % defaults.length];
}

const DEMO = {

async function loadData() {
  const uid = new URLSearchParams(location.search).get('userId');
  if (uid) {
    try {
      const r = await fetch('/api/calendar-data?userId=' + encodeURIComponent(uid));
      const json = await r.json();
      // userNameがnullでもfutureEventsがあれば本番データを使う
      if (r.ok && (json.userName || (json.futureEvents && json.futureEvents.length > 0))) return json;
    } catch(e) {}
  }
  return DEMO;
}

function whenLabel(date, status) {
  if (!date) return status === 'interest' ? '近いうちに' : 'いつか';
  const m = parseInt(date.split('-')[1], 10);
  if ([12,1,2].includes(m)) return '冬ごろ';
  if ([3,4,5].includes(m))  return '春ごろ';
  if ([6,7,8].includes(m))  return '夏ごろ';
  return '秋ごろ';
}

// sceneの最初の2行だけ取り出す（カードのスニペット用）
function sceneSnippet(scene) {
  if (!scene) return '';
  return scene.split('\n').filter(l => l.trim()).slice(0,2).join(' ');
}

// 未来のカテゴリ別締めフレーズ
const FUTURE_CLOSINGS = {
  // マラソン・スポーツ
  run: 'あの日の風が待ってるね🌱',
  marathon: 'あの日の風が待ってるね🌱',
  sport: 'その瞬間が楽しみだね😊',

  gourmet: 'どんな味が待ってるかな🍣',
  // デフォルト
  default: '楽しみだね🌱',
};

function getFutureClosing(event) {
  // closingMessageが保存されていれば最優先（AI生成のその人専用の言葉）
  if (event.closingMessage) return event.closingMessage;
  // フォールバック：タイトルでマッチ
  const text = (event.title + (event.sourceSeed || '')).toLowerCase();
  if (/マラソン|ラン|run/.test(text)) return FUTURE_CLOSINGS.marathon;
  if (/温泉|onsen/.test(text)) return FUTURE_CLOSINGS.onsen;
  if (/旅行|旅|trip/.test(text)) return FUTURE_CLOSINGS.travel;
  if (/寿司|sushi|グルメ|ご飯|食/.test(text)) return FUTURE_CLOSINGS.food;
  if (/スポーツ|sport/.test(text)) return FUTURE_CLOSINGS.sport;
  return FUTURE_CLOSINGS.default;
}

let DATA;

/* 楽しみタブ */

  document.getElementById('hero-name').innerHTML = 'おかえり、<br>' + DATA.userName + 'さん';

  const lead = DATA.futureEvents.find(e => e.status === 'scheduled')

  // daily.heroMessageがあれば最優先（毎日朝に生成される今日だけの言葉）
  const heroMsg = DATA.daily && DATA.daily.heroMessage
    ? DATA.daily.heroMessage.replace(/\n/g, '<br>')

      ? lead.title + '、楽しみだね😊<br><br>今日も少しずつ近づいてるよ🌱'

  const hf = document.getElementById('hero-future');

}

function copyText(text, btn, done, reset) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      btn.innerHTML = done;
      setTimeout(() => { btn.innerHTML = reset; }, 2000);
    });
  } else {
    const el = document.createElement('textarea');
    el.value = text; el.style.position = 'fixed'; el.style.opacity = '0';
    document.body.appendChild(el); el.focus(); el.select();
    document.execCommand('copy'); document.body.removeChild(el);
    btn.innerHTML = done;
    setTimeout(() => { btn.innerHTML = reset; }, 2000);
  }
}

// 種の名前からゆるい色分け（categoryが無い場合のフォールバック）
function seedHue(name) {
  let h = 0; for (let i=0;i<name.length;i++) h = (h*31 + name.charCodeAt(i)) % 997;
  return h;
}

// roughTimingがあればそれを優先、なければstageから仮に振り分け
const TIMING_ZONE = {'今月中':0, '数ヶ月以内':1, '今年中には':2, 'いつか':3};
function guessZone(seed) {
  if (seed.roughTiming && TIMING_ZONE[seed.roughTiming] !== undefined) return TIMING_ZONE[seed.roughTiming];
  const stage = seed.stage;
  if (stage === 'booked') return 2;
  if (stage === 'planning') return 1;
  if (stage === 'interested') return 2;
  return 3;
}

// カテゴリ→色（凡例と一致）。未設定は名前ハッシュでフォールバック
const CAT_COLOR = {
  '旅行・暮らし': {bg:'rgba(126,157,136,.18)', fg:'var(--sage-d)'},
  '体を動かす':   {bg:'rgba(201,123,74,.18)',  fg:'#a15b2e'},
  '創作':         {bg:'rgba(243,194,91,.22)',  fg:'var(--gold-d)'},
  'キャリア':     {bg:'rgba(21,37,53,.1)',     fg:'var(--navy)'},
};
function seedColor(seed) {
  if (seed.category && CAT_COLOR[seed.category]) return CAT_COLOR[seed.category];
  const hue = seedHue(seed.name) % 4;
  return {
    bg: ['rgba(126,157,136,.18)','rgba(201,123,74,.18)','rgba(243,194,91,.22)','rgba(21,37,53,.1)'][hue],
    fg: ['var(--sage-d)','#a15b2e','var(--gold-d)','var(--navy)'][hue],
  };
}

function renderKoukaizu() {
  const el = document.getElementById('koukai-stems');
  if (!el) return;
  const seeds = (DATA.seeds||[]).filter(s => s.stage !== 'harvested');
  if (!seeds.length) { el.innerHTML = ''; return; }

  const zoneRanges = [[2,24],[26,49],[51,74],[76,97]]; // 今月中/数ヶ月以内/今年中には/いつか
  const zoneItems = [[],[],[],[]];
  seeds.forEach(s => zoneItems[guessZone(s)].push(s));

  let html = '';
  zoneItems.forEach((list, zi) => {
    const [lo, hi] = zoneRanges[zi];
    list.forEach((s, i) => {
      const si = (DATA.seeds||[]).indexOf(s);
      const leftPct = list.length === 1 ? (lo+hi)/2 : lo + (i/(list.length-1)) * (hi-lo);
      const heightPx = { discovered:16, interested:34, planning:64, booked:110 }[s.stage] || 20;
      const c = seedColor(s);
      html += '<div class="koukai-stem" style="left:' + leftPct + '%" onclick="openSeedSheet(' + si + ')">' +
        '<div class="koukai-bud" style="background:' + c.bg + ';color:' + c.fg + '">' + s.name + '</div>' +
        '<div class="koukai-stem-line" style="height:' + heightPx + 'px"></div>' +
      '</div>';
    });
  });
  el.innerHTML = html;
}

// 支度パートのHTML（育ち具合メッセージ＋チェックリスト）
function shitakuHtml(s) {
  const preps = s.preparations || [];
  const done = preps.filter(p => p.done).length;

  let growthIco = '🌱', growthMsg;
  if (!preps.length) { growthIco = '🌱'; growthMsg = 'まだ支度は始まっていません'; }
  else if (done === 0) { growthIco = '🌱'; growthMsg = 'まだ支度は始まったばかりです'; }
  else if (done === preps.length) { growthIco = '🌳'; growthMsg = 'もう準備は整ってるみたいですね'; }
  else { growthIco = '🌿'; growthMsg = '支度が' + done + 'つ、育ってきています'; }

  const items = preps.map((p, pi) =>
    '<div class="prep-item' + (p.done ? ' done' : '') + '" onclick="togglePrep(' + pi + ')">' +
      '<div class="prep-check">' + (p.done ? '✓' : '') + '</div>' +
      '<div class="prep-text">' + p.text + '</div>' +
    '</div>'
  ).join('');

  return '<div class="bs-shitaku-head"><span class="bs-shitaku-ico">' + growthIco + '</span>' +
    '<span class="bs-shitaku-label">' + growthMsg + '</span></div>' +
    '<div class="prep-list">' + items + '</div>' +
    '<div class="prep-add" onclick="addPrepViaLine()">＋ アストと支度を考える</div>';
}

function togglePrep(pi) {
  const s = (DATA.seeds||[])[CURRENT_SEED_IDX];
  if (!s || !s.preparations || !s.preparations[pi]) return;
  s.preparations[pi].done = !s.preparations[pi].done;

   DATA.ayumi（pastParagraphs / futureSection）があれば本番データを表示。
   無ければ種のoriginalWishから簡易的に組み立てる。 */
function escapeHtml(s){ return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function openAyumiSheet() {
  const ayumi = DATA.ayumi || {};
  const pastParas = Array.isArray(ayumi.pastParagraphs) ? ayumi.pastParagraphs : [];
  const future = ayumi.futureSection && ayumi.futureSection.text ? ayumi.futureSection.text : null;

  let pastHtml;
  if (pastParas.length) {
    pastHtml = pastParas.map(p => '<div class="letter-para">' + escapeHtml(p.text) + '</div>').join('');
  } else {
    const wishes = (DATA.seeds||[]).map(s => s.originalWish).filter(Boolean);
    const para = wishes.length
      ? escapeHtml(wishes.slice(0,3).join('。')) + '。少しずつ、形になってきている。'
      : 'まだ、ここに綴るものはありません。ASTOと話すうちに、少しずつ綴られていきます。';
    pastHtml = '<div class="letter-para">' + para + '</div>';
  }

  const futureHtml = future ? escapeHtml(future)
    : 'まだどれも、決まってはいない。だからこそ、楽しみが残っている。';

  document.getElementById('bs-body').innerHTML =
    '<div class="letter-open">これまでとこれからのこと</div>' +
    pastHtml +
    '<div class="letter-stitch"><div class="letter-stitch-line"></div><div style="font-size:14px">🌱</div><div class="letter-stitch-line"></div></div>' +
    '<div class="letter-future">' +
      '<div class="letter-future-label">これから</div>' +
      '<div class="letter-para" style="margin-bottom:0">' + futureHtml + '</div>' +
    '</div>' +
    '<div style="font-size:13px;color:var(--muted);line-height:1.9;margin:18px 0;padding:0 2px">この記録は、ASTOと話して育つたびに少しずつ書き足されていきます。</div>' +
    '<button class="bs-talk-btn" onclick="openLine()">💬&nbsp;&nbsp;ASTOと話す</button>';
  document.getElementById('bs-overlay').classList.add('open');
  document.getElementById('bottom-sheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}
</script>
</body>
</html>
